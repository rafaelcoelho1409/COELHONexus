# =============================================================================
# ARGOCD IMAGE UPDATER CR - COELHONexus (COELHO CLOUD ONLY)
# =============================================================================
# SCOPE: pairs with application.yaml — both are COELHO Cloud-only because
#   they expect ArgoCD + GitLab + the coelho-cloud-registry in-cluster
#   hostname. None of those exist on the COELHONexus standalone k3d cluster.
#
# For COELHONexus: `skaffold run` handles build → push → deploy end-to-end
#   (cross-platform, no shell scripts). No Image Updater needed because
#   Skaffold rewrites image refs to unique sha256 tags on every build, which
#   forces a fresh rollout automatically.
#
# Apply to COELHO Cloud's ArgoCD:
#   kubectl apply -f k8s/argocd/
#
# Flow on COELHO Cloud: GitLab CI builds → Registry → Image Updater detects → ArgoCD deploys
# =============================================================================
apiVersion: argocd-image-updater.argoproj.io/v1alpha1
kind: ImageUpdater
metadata:
  name: coelhonexus
  namespace: argocd
spec:
  applicationRefs:
    - namePattern: coelhonexus
      images:
        - alias: fastapi
          imageName: coelho-cloud-registry:5000/coelhonexus-fastapi:latest
          commonUpdateSettings:
            updateStrategy: digest
          manifestTargets:
            helm:
              spec: fastapi.image  # Full image reference (repo:tag@digest)
        - alias: fasthtml
          imageName: coelho-cloud-registry:5000/coelhonexus-fasthtml:latest
          commonUpdateSettings:
            updateStrategy: digest
          manifestTargets:
            helm:
              spec: fasthtml.image  # Full image reference (repo:tag@digest)
        - alias: fastmcp
          imageName: coelho-cloud-registry:5000/coelhonexus-fastmcp:latest
          commonUpdateSettings:
            updateStrategy: digest
          manifestTargets:
            helm:
              spec: fastmcp.image  # Full image reference (repo:tag@digest)
  writeBackConfig:
    method: argocd
