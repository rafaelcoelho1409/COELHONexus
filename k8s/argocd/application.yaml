# =============================================================================
# ARGOCD APPLICATION - COELHONexus (COELHO CLOUD ONLY)
# =============================================================================
# SCOPE: This file targets the COELHO Cloud production cluster. The
#   `repoURL` below points at the in-cluster GitLab service, which only
#   exists on COELHO Cloud (the gitlab module is intentionally NOT included
#   in the COELHONexus standalone infrastructure port).
#
# For the COELHONexus standalone k3d cluster: do NOT apply this file. Use
#   `skaffold run` instead (after `kubectl config use-context k3d-coelhonexus`)
#   — the `coelhonexus` profile in skaffold.yaml auto-activates via kubeContext
#   and handles build, push, and helm install in one cross-platform command.
#   See docs/K8S-DUAL-CLUSTER-FLEX-2026-06-19.md for the architecture rationale.
#
# Apply to COELHO Cloud's ArgoCD:
#   kubectl apply -f k8s/argocd/application.yaml
#
# Namespaces:
#   - coelhonexus-dev: Skaffold local development (ports 23020-23039)
#   - coelhonexus: ArgoCD production (ports 23000-23019)
# =============================================================================
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: coelhonexus
  namespace: argocd
  # Image Updater config in image-updater.yaml (CRD required for v1.1+)
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    # GitLab repository URL — MUST be the in-cluster service URL so it
    # prefix-matches the `argocd-gitlab-repo-creds` repo-creds Secret (the PAT is
    # registered under this URL). Using the Tailscale HTTPS URL clones anonymously
    # → "HTTP Basic: Access denied" on the private repo. Also avoids the TLS hop.
    repoURL: http://gitlab-webservice-default.gitlab.svc.cluster.local:8181/root/COELHONexus.git
    targetRevision: master
    path: k8s/helm
    # Helm configuration
    helm:
      releaseName: coelhonexus
      valueFiles:
        - values.yaml
      # values.yaml already configured with correct registry and imagePullPolicy
      # No overrides needed - all config is in values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: coelhonexus
  syncPolicy:
    automated:
      prune: true       # Delete resources not in Git
      selfHeal: true    # Revert manual changes
    syncOptions:
      - CreateNamespace=true
      - PruneLast=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
