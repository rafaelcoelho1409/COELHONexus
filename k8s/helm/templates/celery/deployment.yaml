{{- if .Values.celery.enabled }}
{{- $appName := "celery" -}}
{{- $fastapi := index $.Values "fastapi" }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: coelhonexus-celery-worker
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: {{ .Chart.Name }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/version: {{ .Chart.AppVersion }}
    app.kubernetes.io/component: celery-worker
    app.kubernetes.io/managed-by: {{ .Release.Service }}
spec:
  replicas: {{ .Values.celery.replicas }}
  selector:
    matchLabels:
      app: coelhonexus-celery-worker
  template:
    metadata:
      labels:
        app: coelhonexus-celery-worker
    spec:
      {{- if and (eq .Values.environment "production") (.Values.registry.imagePullSecret) }}
      imagePullSecrets:
        - name: {{ .Values.registry.imagePullSecret }}
      {{- end }}
      containers:
        # Celery worker — same image as FastAPI, different entrypoint
        - name: celery-worker
          image: {{ $fastapi.image }}
          imagePullPolicy: {{ $fastapi.imagePullPolicy }}
          # SYS_PTRACE lets py-spy attach to the worker's Python processes to
          # dump a live stack trace when a task hangs (no restart required).
          # Scoped to worker only — FastAPI pod doesn't need it.
          securityContext:
            capabilities:
              add:
                - SYS_PTRACE
          command:
            - celery
            - -A
            - celery_app
            - worker
            # Environment-suffixed queue names (e.g. "llm-local" or
            # "llm-production"). Prevents dev and prod workers from stealing
            # each other's tasks on the shared Redis broker. Must stay in sync
            # with task_routes in apps/fastapi/celery_app.py.
            - -Q
            - {{- $env := .Values.environment -}}{{- $queues := splitList "," .Values.celery.queues -}}{{- $suffixed := list -}}{{- range $queues -}}{{- $suffixed = append $suffixed (printf "%s-%s" . $env) -}}{{- end }} {{ join "," $suffixed }}
            - -c
            - "{{ .Values.celery.concurrency }}"
            - --loglevel=info
            - -n
            - "worker@%h"
          envFrom:
            - configMapRef:
                name: coelhonexus-fastapi-configmap
          env:
            # PYTHONPATH must include /app so forked worker processes can import
            # routers/, services/, schemas/ etc. Celery forks don't inherit sys.path
            # modifications from the parent process.
            - name: PYTHONPATH
              value: "/app"
            {{- include "coelhonexus.secretEnvVars" . | nindent 12 }}
          resources:
            requests:
              memory: {{ .Values.celery.resources.requests.memory }}
              cpu: {{ .Values.celery.resources.requests.cpu }}
            limits:
              memory: {{ .Values.celery.resources.limits.memory }}
              cpu: {{ .Values.celery.resources.limits.cpu }}
        # Sidecar: PO Token provider (needed for crawler queue yt-dlp tasks)
        - name: bgutil-pot
          image: brainicism/bgutil-ytdlp-pot-provider:1.3.1
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 4416
              protocol: TCP
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            tcpSocket:
              port: 4416
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            tcpSocket:
              port: 4416
            initialDelaySeconds: 5
            periodSeconds: 10
{{- end }}
