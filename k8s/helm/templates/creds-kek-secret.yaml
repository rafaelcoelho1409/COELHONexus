{{- /*
BYOK credential-store KEK (key-encryption-key).

Provisioned ONLY when llmCredentials.manageKek=true. Generates a valid Fernet
key (urlsafe-base64 of 32 random bytes) ONCE and RETAINS it across `helm
upgrade` via the lookup idiom — so the key that encrypted llm/credentials.enc
never changes under a running release (which would orphan the stored keys).
`helm.sh/resource-policy: keep` keeps the Secret even on `helm uninstall`.

When manageKek=false (default), this renders nothing: the store auto-generates
+ persists a KEK inside MinIO instead (zero-config; survives restarts via the
MinIO PVC). Enabling this later is safe — the store migrates existing ciphertext
to this KEK on first read (see domains/llm/credentials/service.py).
*/ -}}
{{- if .Values.llmCredentials.manageKek }}
{{- $name := .Values.llmCredentials.kekSecretName }}
{{- $key := .Values.llmCredentials.kekSecretKey }}
{{- $existing := lookup "v1" "Secret" .Release.Namespace $name }}
{{- $value := "" }}
{{- if and $existing $existing.data (index $existing.data $key) }}
{{- $value = index $existing.data $key }}
{{- else }}
{{- $fernet := randBytes 32 | replace "+" "-" | replace "/" "_" }}
{{- $value = $fernet | b64enc }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $name }}
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/part-of: coelhonexus
    app.kubernetes.io/managed-by: {{ .Release.Service }}
  annotations:
    "helm.sh/resource-policy": keep
type: Opaque
data:
  {{ $key }}: {{ $value | quote }}
{{- end }}
