# Environment configuration
# 'local' = Skaffold local development (no registry prefix)
# 'production' = ArgoCD with GitLab Container Registry
environment: production

observability:
  enabled: true
  otlp_endpoint: "alloy.monitoring:4317"

# Dual-export OTel: Alloy gRPC (empty = disable) + LangFuse HTTP (empty = LGTM-only).
# Celery overrides OTEL_SERVICE_NAME at pod level to avoid masquerading as fastapi.
otel:
  alloy_endpoint: "http://alloy.alloy.svc.cluster.local:4317"
  langfuse_otlp_endpoint: "http://langfuse-web.langfuse.svc.cluster.local:3000/api/public/otel"
  service_name: "coelhonexus-fastapi"
  service_version: "1.0.0"
  git_sha: ""

minio:
  host: minio.minio.svc.cluster.local
  port: 9000
  endpoint: "http://minio.minio.svc.cluster.local:9000"
  bucket: "coelhonexus"

redis:
  host: redis-master.redis.svc.cluster.local
  port: 6379

postgresql:
  host: postgresql.postgresql.svc.cluster.local
  port: 5432
  user: postgres
  database: coelhonexus

neo4j:
  uri: "bolt://neo4j.neo4j.svc.cluster.local:7687"

qdrant:
  url: "http://qdrant.qdrant.svc.cluster.local:6333"
  port: 6333

elasticsearch:
  # ECK default is HTTPS with self-signed certs; asyncpg uses verify_certs=False.
  host: "https://elasticsearch-es-http.elasticsearch.svc.cluster.local:9200"
  username: "elastic"

playwright:
  cdp_headless: "http://playwright-headless.playwright.svc.cluster.local:9224"
  cdp_headed: "http://playwright-headed.playwright.svc.cluster.local:9222"

# MUST re-ingest all data after changing (incompatible vector dimensions).
embedding:
  model: "nvidia/llama-nemotron-embed-1b-v2"

dd:
  useClassicalMap: "1"
  useClassicalGrader: "1"
  useClassicalCritic: "1"
  useClassicalOutline: "1"
  useClassicalRefiner: "1"
  useClassicalCurator: "1"
  useClassicalSummary: "1"
  useSynthPool: "1"
  # One model pinned per chapter for Self-Refine convergence (same model sees its own attempts).
  pinChapterModel: "1"
  # Global LLM concurrency cap per process; prevents cascade-exhaustion on free-tier providers.
  llmGlobalConcurrency: "10"
  # "0" = per-shard mode (stable default); "1" = global KMeans (regressed on <500-file corpora).
  globalMap: "0"
  # "1" = live discovery + benchmark ranking; "0" = static catalog fallback.
  dynamicCatalog: "1"
  # "1" = disable ParetoBandit (rollback to simple-shuffle); "0" = bandit runs.
  paretoBanditDisable: "0"
  # "1" = GMM soft-membership resolver (~85% LLM-judge reduction at ~3-5pp accuracy cost).
  refineUseGmm: "1"
  proposeOptimalStopping: "true"
  sawcDeriveOptimalStopping: "true"
  # Roll back to "1" if 429 cascades resume.
  studySem: "2"

secretName: coelhonexus-secret

# BYOK credential store: keys entered via /settings UI → Fernet-encrypted MinIO.
# manageKek=false: store auto-generates KEK inside MinIO (zero-config, safe default).
# manageKek=true: chart provisions a stable Helm-managed KEK Secret (stronger separation).
llmCredentials:
  manageKek: false
  kekSecretName: coelhonexus-creds-kek
  kekSecretKey: kd-creds-key
  # true = import env provider keys into encrypted store on boot, then drop plaintext.
  importEnvKeys: false

secretMappings:
  - envName: REDIS_PASSWORD
    key: redis-password
  - envName: NEO4J_USERNAME
    key: neo4j-username
  - envName: NEO4J_PASSWORD
    key: neo4j-password
  - envName: AWS_ACCESS_KEY_ID
    key: aws-access-key-id
  - envName: AWS_SECRET_ACCESS_KEY
    key: aws-secret-access-key
  # LLM provider keys are BYOK via /settings UI (Fernet-encrypted MinIO).
  # Uncomment to restore env fallback, or use llmCredentials.importEnvKeys=true to migrate.
  # - envName: GROQ_API_KEY
  #   key: groq-api-key
  # - envName: NVIDIA_API_KEY
  #   key: nvidia-api-key
  # - envName: SAMBANOVA_API_KEY
  #   key: sambanova-api-key
  # - envName: CEREBRAS_API_KEY
  #   key: cerebras-api-key
  # - envName: MISTRAL_API_KEY
  #   key: mistral-api-key
  # - envName: GOOGLE_API_KEY
  #   key: google-api-key
  # - envName: DEEPSEEK_API_KEY
  #   key: deepseek-api-key
  - envName: ELASTICSEARCH_PASSWORD
    key: elasticsearch-password
  - envName: QDRANT_API_KEY
    key: qdrant-api-key
  - envName: LANGFUSE_PUBLIC_KEY
    key: langfuse-public-key
  - envName: LANGFUSE_SECRET_KEY
    key: langfuse-secret-key
  - envName: LANGFUSE_HOST
    key: langfuse-host
  - envName: POSTGRES_PASSWORD
    key: postgres-password
  - envName: FLOWER_BASIC_AUTH
    key: flower-basic-auth

# Default targets COELHO CLOUD registry. Layer values-coelhonexus.yaml to target the standalone cluster.
registry:
  url: coelho-cloud-registry:5000
  imagePullSecret: ""

fastapi:
  image: coelho-cloud-registry:5000/coelhonexus-fastapi:latest
  imagePullPolicy: Always
  replicas: 1
  resources:
    requests:
      memory: "2Gi"
      cpu: "500m"
    limits:
      memory: "8Gi"
      cpu: "2000m"
  portsSettings:
    ports:
      - name: http
        port: 8000
        targetPort: 8000
        nodePort: 30020
        protocol: TCP
    type: LoadBalancer
  startupProbeSettings:
    startupProbe:
      httpGet:
        path: /health
        port: 8000
      failureThreshold: 30
      periodSeconds: 10
  livenessProbeSettings:
    livenessProbe:
      httpGet:
        path: /health
        port: 8000
      initialDelaySeconds: 0
      periodSeconds: 15
      failureThreshold: 3
  readinessProbeSettings:
    readinessProbe:
      httpGet:
        path: /health
        port: 8000
      initialDelaySeconds: 0
      periodSeconds: 5
      failureThreshold: 3

celery:
  enabled: true
  replicas: 1
  # 2 workers: peak COW RSS (5 × 2GB + parent) OOMKilled at concurrency=5; 2 × 8 LLM calls already hits DD_LLM_GLOBAL_CONCURRENCY.
  concurrency: 2
  queues: "crawler,embedding,llm,planner,synth,default,ycs,rr"
  resources:
    requests:
      memory: "2Gi"
      cpu: "500m"
    limits:
      memory: "6Gi"  # concurrency=2 + worker_max_memory=2GB + parent 1.8GB ≈ 5.8GB peak
      cpu: "2000m"

# Flower uses mher/flower (NOT FastAPI image) — shelve storage, single-writer enforced.
flower:
  enabled: true
  image: mher/flower:2.0.1
  imagePullPolicy: IfNotPresent
  replicas: 1  # DO NOT INCREASE — shelve DB is single-writer
  persistDb: true
  storageSize: "1Gi"
  storageClassName: "local-path"
  maxTasks: 10000
  purgeOfflineWorkersSeconds: 300
  stateSaveInterval: 10000
  # Tailnet is the trust boundary by default. Enable + set FLOWER_BASIC_AUTH in the secret for auth.
  basicAuth:
    enabled: false
  resources:
    requests:
      memory: "128Mi"
      cpu: "50m"
    limits:
      memory: "256Mi"
      cpu: "200m"
  portsSettings:
    ports:
      - name: http
        port: 5555
        targetPort: 5555
        nodePort: 30022
        protocol: TCP
    type: LoadBalancer
  livenessProbeSettings:
    livenessProbe:
      httpGet:
        path: /healthcheck
        port: 5555
      initialDelaySeconds: 15
      periodSeconds: 30
      failureThreshold: 3
  readinessProbeSettings:
    readinessProbe:
      httpGet:
        path: /healthcheck
        port: 5555
      initialDelaySeconds: 5
      periodSeconds: 10
      failureThreshold: 3

fasthtml:
  image: coelho-cloud-registry:5000/coelhonexus-fasthtml:latest
  imagePullPolicy: Always
  replicas: 1
  resources:
    requests:
      memory: "256Mi"
      cpu: "100m"
    limits:
      memory: "512Mi"
      cpu: "500m"
  portsSettings:
    ports:
      - name: http
        port: 3000
        targetPort: 3000
        nodePort: 30023
        protocol: TCP
    type: LoadBalancer
  startupProbeSettings:
    startupProbe:
      httpGet:
        path: /health
        port: 3000
      failureThreshold: 12
      periodSeconds: 5
  livenessProbeSettings:
    livenessProbe:
      httpGet:
        path: /health
        port: 3000
      initialDelaySeconds: 0
      periodSeconds: 10
      failureThreshold: 3
  readinessProbeSettings:
    readinessProbe:
      httpGet:
        path: /health
        port: 3000
      initialDelaySeconds: 0
      periodSeconds: 5
      failureThreshold: 3

# Internal ClusterIP — Research Radar agent connects as MCP client via Streamable-HTTP at /mcp/.
fastmcp:
  image: coelho-cloud-registry:5000/coelhonexus-fastmcp:latest
  imagePullPolicy: Always
  replicas: 1
  resources:
    requests:
      memory: "256Mi"
      cpu: "100m"
    limits:
      memory: "512Mi"
      cpu: "500m"
  portsSettings:
    ports:
      - name: http
        port: 8000
        targetPort: 8000
        protocol: TCP
    type: ClusterIP
  startupProbeSettings:
    startupProbe:
      httpGet:
        path: /health
        port: 8000
      failureThreshold: 12
      periodSeconds: 5
  livenessProbeSettings:
    livenessProbe:
      httpGet:
        path: /health
        port: 8000
      initialDelaySeconds: 0
      periodSeconds: 10
      failureThreshold: 3
  readinessProbeSettings:
    readinessProbe:
      httpGet:
        path: /health
        port: 8000
      initialDelaySeconds: 0
      periodSeconds: 5
      failureThreshold: 3
