# Environment configuration
# 'local' = Skaffold local development (no registry prefix)
# 'production' = ArgoCD with GitLab Container Registry
environment: production

# Observability - OpenTelemetry to Grafana Alloy + LGTM
observability:
  enabled: false
  otlp_endpoint: "alloy.monitoring:4317"

# External services — all in-cluster ClusterIP services in the same K3s cluster.
# Credentials are loaded from coelhonexus-secret (upload via upload_env_to_k3d.sh)
minio:
  host: minio.minio.svc.cluster.local
  port: 9000
  endpoint: "http://minio.minio.svc.cluster.local:9000"

redis:
  # In-cluster ClusterIP service (redis-master.redis)
  host: redis-master.redis.svc.cluster.local
  port: 6379

postgresql:
  # In-cluster access (same K3s cluster as COELHOCloud)
  host: postgresql.postgresql.svc.cluster.local
  port: 5432
  user: postgres
  database: coelhonexus

neo4j:
  # In-cluster ClusterIP service (neo4j.neo4j); Bolt on 7687
  uri: "bolt://neo4j.neo4j.svc.cluster.local:7687"
  # Credentials loaded from secret (NEO4J_USERNAME, NEO4J_PASSWORD)

qdrant:
  # In-cluster ClusterIP service (qdrant.qdrant); HTTP REST on 6333, gRPC on 6334
  url: "http://qdrant.qdrant.svc.cluster.local:6333"
  port: 6333

elasticsearch:
  # In-cluster ClusterIP service (elasticsearch-es-http.elasticsearch).
  # COELHO Cloud's ECK-operator deployment exposes HTTPS by default (self-signed
  # certs); the AsyncElasticsearch client in app.py uses verify_certs=False so
  # the self-signed cert is accepted. Service was renamed during the v2 rewrite
  # (was elasticsearch-master in v1).
  host: "https://elasticsearch-es-http.elasticsearch.svc.cluster.local:9200"
  username: "elastic"
  # Password loaded from secret (ELASTICSEARCH_PASSWORD)

# Proxy configuration for YouTube Transcript API (WARP + Tor fallback)
# In-cluster ClusterIP services
proxy:
  warp:
    # In-cluster ClusterIP service (warp.warp); auth credentials from secret
    host: "warp.warp.svc.cluster.local"
    port: 1080
  tor:
    # In-cluster ClusterIP service (tor.tor); no auth
    host: "tor.tor.svc.cluster.local"
    port: 9150

# Playwright CDP for browser automation (bypasses IP blocking)
# COELHO Cloud's playwright module deploys SEPARATE Services per mode (renamed
# during v2 rewrite — was a single `playwright` service in v1):
#   playwright-headed   :9222  (chromium with noVNC sidecar, displayable)
#   playwright-headless :9224  (chromedp/headless-shell, no display)
playwright:
  cdp_headless: "http://playwright-headless.playwright.svc.cluster.local:9224"
  cdp_headed: "http://playwright-headed.playwright.svc.cluster.local:9222"

# Embedding model (NVIDIA NIM API — see docs/NVIDIA-NIM-EMBEDDING-MODELS.md)
# Change model here to switch. MUST re-ingest all data after changing (vectors are incompatible across models).
embedding:
  model: "nvidia/llama-nemotron-embed-1b-v2"  # 2048d, 8K context, best quality

# SearXNG — in-cluster metasearch used by Knowledge Distiller to resolve
# official documentation URLs (and any future web-search need). Internal DNS
# avoids Tailscale TLS overhead on every query. Service lives in the
# `searxng` namespace and is already deployed outside this chart.
searxng:
  url: "http://searxng.searxng.svc.cluster.local:8080"

# Secret containing credentials (created by upload_env_to_k3d.sh)
secretName: coelhonexus-secret

# Secret key mappings (upload_env_to_k3d.sh converts UPPER_CASE to lower-case)
# Maps secret keys back to expected environment variable names
secretMappings:
  - envName: REDIS_PASSWORD
    key: redis-password
  - envName: NEO4J_USERNAME
    key: neo4j-username
  - envName: NEO4J_PASSWORD
    key: neo4j-password
  - envName: AWS_ACCESS_KEY_ID
    key: aws-access-key-id
  - envName: AWS_SECRET_ACCESS_KEY
    key: aws-secret-access-key
  - envName: OPENAI_API_KEY
    key: openai-api-key
  - envName: GROQ_API_KEY
    key: groq-api-key
  - envName: NVIDIA_API_KEY
    key: nvidia-api-key
  - envName: SAMBANOVA_API_KEY
    key: sambanova-api-key
  - envName: CEREBRAS_API_KEY
    key: cerebras-api-key
  - envName: MISTRAL_API_KEY
    key: mistral-api-key
  - envName: GOOGLE_API_KEY
    key: google-api-key
  - envName: DEEPSEEK_API_KEY
    key: deepseek-api-key
  - envName: ZHIPU_API_KEY
    key: zhipu-api-key
  - envName: ELASTICSEARCH_PASSWORD
    key: elasticsearch-password
  - envName: QDRANT_API_KEY
    key: qdrant-api-key
  - envName: LANGFUSE_PUBLIC_KEY
    key: langfuse-public-key
  - envName: LANGFUSE_SECRET_KEY
    key: langfuse-secret-key
  - envName: LANGFUSE_HOST
    key: langfuse-host
  - envName: POSTGRES_PASSWORD
    key: postgres-password
  - envName: WARP_PROXY_USER
    key: warp-proxy-user
  - envName: WARP_PROXY_PASS
    key: warp-proxy-pass
  - envName: EXA_API_KEY
    key: exa-api-key
  - envName: TAVILY_API_KEY
    key: tavily-api-key
  - envName: JINA_API_KEY
    key: jina-api-key
  - envName: LINKUP_API_KEY
    key: linkup-api-key
  # Flower basic auth — only consumed when flower.basicAuth.enabled=true
  - envName: FLOWER_BASIC_AUTH
    key: flower-basic-auth

# Registry configuration - uses k3d COELHOCloud Registry (same as Skaffold)
registry:
  url: coelho-cloud-registry:5000
  # k3d registry doesn't need authentication
  imagePullSecret: ""

# Image configurations
# Uses k3d in-cluster registry (coelho-cloud-registry:5000) — see registry.url below
# with 'latest' tag and imagePullPolicy: Always


# FastAPI unified ML backend (includes River incremental and Sklearn batch training)
# Uses k3d COELHOCloud Registry (same as Skaffold)
fastapi:
  image: localhost:5001/coelhonexus-fastapi:latest
  imagePullPolicy: Always  # Always pull latest from Skaffold builds
  replicas: 1
  resources:
    requests:
      memory: "2Gi"
      cpu: "500m"
    limits:
      memory: "8Gi"
      cpu: "2000m"
  portsSettings:
    ports:
      - name: http
        port: 8000
        targetPort: 8000
        nodePort: 30020
        protocol: TCP
    type: LoadBalancer
  # Probe execution order: startup -> liveness + readiness
  # startupProbe runs ONLY during startup, disables liveness/readiness until success
  startupProbeSettings:
    startupProbe:
      httpGet:
        path: /health
        port: 8000
      failureThreshold: 30      # 30 x 10s = 300s max startup time
      periodSeconds: 10
  livenessProbeSettings:
    livenessProbe:
      httpGet:
        path: /health
        port: 8000
      initialDelaySeconds: 0    # Starts immediately after startup probe passes
      periodSeconds: 15
      failureThreshold: 3
  readinessProbeSettings:
    readinessProbe:
      httpGet:
        path: /health
        port: 8000
      initialDelaySeconds: 0    # Starts immediately after startup probe passes
      periodSeconds: 5
      failureThreshold: 3

# Celery worker (background tasks — same image as FastAPI, different command)
celery:
  enabled: true
  replicas: 1
  concurrency: 5  # Number of concurrent tasks per worker
  # Queue names are environment-suffixed in the deployment template (see
  # k8s/helm/templates/celery/deployment.yaml). Both dev (skaffold) and prod
  # (argocd) share the same Redis broker, but workers only consume their own
  # environment's tasks — no cross-env task stealing.
  queues: "crawler,embedding,llm,default"
  resources:
    requests:
      memory: "1Gi"
      cpu: "100m"
    limits:
      memory: "4Gi"
      cpu: "500m"  # Low CPU cap — embedding runs slower but doesn't slow the machine

# Flower — Celery monitoring dashboard (UI for the workers above)
# Deployed per-project (was previously in COELHO Cloud shared infra).
# Uses upstream mher/flower image (NOT the FastAPI image) — Flower doesn't
# need app code, it watches broker events and stores task history in a
# Python shelve file. Smaller image, separate CVE surface, no rebuild
# coupling with FastAPI. Single replica enforced — shelve is single-writer.
flower:
  enabled: true
  # PyPI 2.0.1 frozen since 2023-08-13; no newer release as of 2026.
  # mher/flower master tag rebuilt monthly with patches but not released.
  image: mher/flower:2.0.1
  imagePullPolicy: IfNotPresent
  replicas: 1                # DO NOT INCREASE — shelve DB is single-writer.
  # Persistent task history — Flower writes /data/flower.dat (shelve format,
  # NOT SQLite — common doc misread). 1 GiB is wildly oversized for a 10k
  # task ring (~5-50 MB actual) but cheap insurance against ring expansion.
  persistDb: true
  storageSize: "1Gi"
  # Named to match _helpers.tpl coelhonexus.PVCSettings macro (key lookup).
  storageClassName: "local-path"
  maxTasks: 10000                # in-memory task ring; older tasks evict
  purgeOfflineWorkersSeconds: 300  # remove stale worker rows after 5 min
  stateSaveInterval: 10000       # write shelve every 10s (ms)
  # Basic auth — Tailnet IS the trust boundary by default (homelab pattern).
  # Flip on by setting basicAuth.enabled=true AND adding FLOWER_BASIC_AUTH=
  # "user:pass" to coelhonexus-secret via upload_env_to_k3d.sh.
  # Flower's --basic_auth supports comma-separated multi-user.
  basicAuth:
    enabled: false
  resources:
    requests:
      memory: "128Mi"
      cpu: "50m"
    limits:
      memory: "256Mi"
      cpu: "200m"
  # Service config — same pattern as fastapi/web (LoadBalancer + NodePort in
  # production, ClusterIP in local; switched by _helpers.tpl). Production
  # NodePorts are 23000-23019; we pick 30022 to align with the pattern
  # (fastapi=30020, web=30021, flower=30022).
  portsSettings:
    ports:
      - name: http
        port: 5555
        targetPort: 5555
        nodePort: 30022
        protocol: TCP
    type: LoadBalancer
  # Probes — Flower's /healthcheck is auth-exempt and returns "OK".
  # Officially documented; no liveness flapping during startup.
  livenessProbeSettings:
    livenessProbe:
      httpGet:
        path: /healthcheck
        port: 5555
      initialDelaySeconds: 15
      periodSeconds: 30
      failureThreshold: 3
  readinessProbeSettings:
    readinessProbe:
      httpGet:
        path: /healthcheck
        port: 5555
      initialDelaySeconds: 5
      periodSeconds: 10
      failureThreshold: 3

# FastHTML frontend (Python + python-fasthtml + HTMX + PWA).
# Replaced the legacy Go web frontend on 2026-05-09 — same /static, same
# /kd/inspect, same /api/test contract. NodePort 30023 retained to avoid
# breaking any external callers that may still reference the old `web` URLs.
fasthtml:
  image: localhost:5001/coelhonexus-fasthtml:latest
  imagePullPolicy: Always
  replicas: 1
  resources:
    requests:
      memory: "256Mi"
      cpu: "100m"
    limits:
      memory: "512Mi"
      cpu: "500m"
  portsSettings:
    ports:
      - name: http
        port: 3000
        targetPort: 3000
        nodePort: 30023        # web=30021, flower=30022, fasthtml=30023
        protocol: TCP
    type: LoadBalancer
  startupProbeSettings:
    startupProbe:
      httpGet:
        path: /health
        port: 3000
      failureThreshold: 12     # 12 x 5s = 60s — uvicorn cold start + reload watcher
      periodSeconds: 5
  livenessProbeSettings:
    livenessProbe:
      httpGet:
        path: /health
        port: 3000
      initialDelaySeconds: 0
      periodSeconds: 10
      failureThreshold: 3
  readinessProbeSettings:
    readinessProbe:
      httpGet:
        path: /health
        port: 3000
      initialDelaySeconds: 0
      periodSeconds: 5
      failureThreshold: 3
