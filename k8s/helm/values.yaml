# Environment configuration
# 'local' = Skaffold local development (no registry prefix)
# 'production' = ArgoCD with GitLab Container Registry
environment: production

# Observability - OpenTelemetry to Grafana Alloy + LGTM
observability:
  enabled: false
  otlp_endpoint: "alloy.monitoring:4317"

# External services (COELHOCloud infrastructure via Tailscale)
# Credentials are loaded from coelhonexus-secret (upload via upload_env_to_k3d.sh)
minio:
  host: minio-api.YOUR_TAILNET_DOMAIN.ts.net
  port: 443
  endpoint: "https://minio-api.YOUR_TAILNET_DOMAIN.ts.net"

redis:
  # External access via Tailscale (WireGuard encrypted)
  host: redis-tcp.YOUR_TAILNET_DOMAIN.ts.net
  port: 6379

postgresql:
  # In-cluster access (same K3s cluster as COELHOCloud)
  host: postgresql.postgresql.svc.cluster.local
  port: 5432
  user: postgres
  database: coelhonexus

neo4j:
  # External access via Tailscale (WireGuard encrypted)
  uri: "bolt://neo4j.YOUR_TAILNET_DOMAIN.ts.net:7687"
  # Credentials loaded from secret (NEO4J_USERNAME, NEO4J_PASSWORD)

qdrant:
  # External access via Tailscale HTTPS (port 443 only, 6333/6334 not exposed)
  url: "https://qdrant.YOUR_TAILNET_DOMAIN.ts.net"
  port: 443

elasticsearch:
  # External access via Tailscale (WireGuard encrypted)
  host: "https://elasticsearch.YOUR_TAILNET_DOMAIN.ts.net"
  username: "elastic"
  # Password loaded from secret (ELASTICSEARCH_PASSWORD)

# Proxy configuration for YouTube Transcript API (WARP + Tor fallback)
# Uses external Tailscale addresses for remote access
proxy:
  warp:
    # External access via Tailscale (auth credentials from secret)
    host: "warp-proxy.YOUR_TAILNET_DOMAIN.ts.net"
    port: 1080
  tor:
    # External access via Tailscale (no auth)
    host: "tor-proxy.YOUR_TAILNET_DOMAIN.ts.net"
    port: 9150

# Playwright CDP for browser automation (bypasses IP blocking)
# Uses external Tailscale addresses for remote access
playwright:
  cdp_headless: "https://playwright-cdp-headless.YOUR_TAILNET_DOMAIN.ts.net"
  cdp_headed: "https://playwright-cdp.YOUR_TAILNET_DOMAIN.ts.net"

# Embedding model (NVIDIA NIM API — see docs/NVIDIA-NIM-EMBEDDING-MODELS.md)
# Change model here to switch. MUST re-ingest all data after changing (vectors are incompatible across models).
embedding:
  model: "nvidia/llama-nemotron-embed-1b-v2"  # 2048d, 8K context, best quality

# Secret containing credentials (created by upload_env_to_k3d.sh)
secretName: coelhonexus-secret

# Secret key mappings (upload_env_to_k3d.sh converts UPPER_CASE to lower-case)
# Maps secret keys back to expected environment variable names
secretMappings:
  - envName: REDIS_PASSWORD
    key: redis-password
  - envName: NEO4J_USERNAME
    key: neo4j-username
  - envName: NEO4J_PASSWORD
    key: neo4j-password
  - envName: AWS_ACCESS_KEY_ID
    key: aws-access-key-id
  - envName: AWS_SECRET_ACCESS_KEY
    key: aws-secret-access-key
  - envName: OPENAI_API_KEY
    key: openai-api-key
  - envName: GROQ_API_KEY
    key: groq-api-key
  - envName: NVIDIA_API_KEY
    key: nvidia-api-key
  - envName: SAMBANOVA_API_KEY
    key: sambanova-api-key
  - envName: ELASTICSEARCH_PASSWORD
    key: elasticsearch-password
  - envName: QDRANT_API_KEY
    key: qdrant-api-key
  - envName: POSTGRES_PASSWORD
    key: postgres-password
  - envName: WARP_PROXY_USER
    key: warp-proxy-user
  - envName: WARP_PROXY_PASS
    key: warp-proxy-pass

# Registry configuration - uses k3d COELHOCloud Registry (same as Skaffold)
registry:
  url: coelhocloud-registry:5000
  # k3d registry doesn't need authentication
  imagePullSecret: ""

# Image configurations
# Uses GitLab Container Registry (registry.YOUR_TAILNET_DOMAIN.ts.net)
# with 'latest' tag and imagePullPolicy: Always


# FastAPI unified ML backend (includes River incremental and Sklearn batch training)
# Uses k3d COELHOCloud Registry (same as Skaffold)
fastapi:
  image: coelhocloud-registry:5000/coelhonexus-fastapi:latest
  imagePullPolicy: Always  # Always pull latest from Skaffold builds
  replicas: 1
  resources:
    requests:
      memory: "2Gi"
      cpu: "500m"
    limits:
      memory: "8Gi"
      cpu: "2000m"
  portsSettings:
    ports:
      - name: http
        port: 8000
        targetPort: 8000
        nodePort: 30020
        protocol: TCP
    type: LoadBalancer
  # Probe execution order: startup -> liveness + readiness
  # startupProbe runs ONLY during startup, disables liveness/readiness until success
  startupProbeSettings:
    startupProbe:
      httpGet:
        path: /health
        port: 8000
      failureThreshold: 30      # 30 x 10s = 300s max startup time
      periodSeconds: 10
  livenessProbeSettings:
    livenessProbe:
      httpGet:
        path: /health
        port: 8000
      initialDelaySeconds: 0    # Starts immediately after startup probe passes
      periodSeconds: 15
      failureThreshold: 3
  readinessProbeSettings:
    readinessProbe:
      httpGet:
        path: /health
        port: 8000
      initialDelaySeconds: 0    # Starts immediately after startup probe passes
      periodSeconds: 5
      failureThreshold: 3

# Celery worker (background tasks — same image as FastAPI, different command)
celery:
  enabled: true
  replicas: 1
  concurrency: 5  # Number of concurrent tasks per worker
  queues: "crawler,embedding,llm,default"
  resources:
    requests:
      memory: "1Gi"
      cpu: "100m"
    limits:
      memory: "4Gi"
      cpu: "500m"  # Low CPU cap — embedding runs slower but doesn't slow the machine

# Web frontend (Go + Templ + HTMX + PWA)
web:
  image: coelhocloud-registry:5000/coelhonexus-web:latest
  imagePullPolicy: Always
  replicas: 1
  resources:
    requests:
      memory: "256Mi"
      cpu: "100m"
    limits:
      memory: "512Mi"
      cpu: "500m"
  portsSettings:
    ports:
      - name: http
        port: 3000
        targetPort: 3000
        nodePort: 30021
        protocol: TCP
    type: LoadBalancer
  # Probe execution order: startup -> liveness + readiness
  startupProbeSettings:
    startupProbe:
      httpGet:
        path: /health
        port: 3000
      failureThreshold: 6       # 6 x 5s = 30s max startup time
      periodSeconds: 5
  livenessProbeSettings:
    livenessProbe:
      httpGet:
        path: /health
        port: 3000
      initialDelaySeconds: 0    # Starts immediately after startup probe passes
      periodSeconds: 10
      failureThreshold: 3
  readinessProbeSettings:
    readinessProbe:
      httpGet:
        path: /health
        port: 3000
      initialDelaySeconds: 0    # Starts immediately after startup probe passes
      periodSeconds: 5
      failureThreshold: 3
