# Environment configuration
# 'local' = Skaffold local development (no registry prefix)
# 'production' = ArgoCD with GitLab Container Registry
environment: production

# Observability - OpenTelemetry to Grafana Alloy + LGTM
observability:
  enabled: false
  otlp_endpoint: "alloy.monitoring:4317"

# OpenTelemetry (2026-05-12 night) — dual-export pipeline.
#
# alloy_endpoint:
#   gRPC OTLP endpoint of Alloy's `otelcol.receiver.otlp` block in the
#   `monitoring` namespace. Empty string disables OTel entirely
#   (FastAPI/Celery boot without instrumentation, no-op tracer + meter).
#   When set, every LiteLLM call, every KD phase, every refine iter is
#   exported as a trace span with attributes for routing-decision queries.
#
# langfuse_otlp_endpoint:
#   HTTP OTLP endpoint of self-hosted LangFuse v3+. The Python SDK appends
#   `/v1/traces` automatically if not present. Reads LANGFUSE_PUBLIC_KEY +
#   LANGFUSE_SECRET_KEY from the env secrets for HTTP Basic auth. Empty
#   string disables the LangFuse arm of the dual-export (LGTM-only mode).
#
# service_name / service_version:
#   service.name + service.version resource attrs — surfaced in Grafana +
#   LangFuse for distinguishing the FastAPI process from Celery workers
#   (same service.name "coelhonexus-fastapi" but different process.pid).
otel:
  # NOTE 2026-05-12 night: corrected from `alloy.monitoring` after empirical
  # validation. Cluster's Alloy service lives in the `alloy` namespace (the
  # service name is `alloy`, ports 12345/4317/4318). The OTLP gRPC receiver
  # is on 4317. Verified via `kubectl get svc -A | grep alloy`.
  alloy_endpoint: "http://alloy.alloy.svc.cluster.local:4317"
  langfuse_otlp_endpoint: "http://langfuse-web.langfuse.svc.cluster.local:3000/api/public/otel"
  service_name: "coelhonexus-fastapi"
  service_version: "1.0.0"

# External services — all in-cluster ClusterIP services in the same K3s cluster.
# Credentials are loaded from coelhonexus-secret (upload via upload_env_to_k3d.sh)
minio:
  host: minio.minio.svc.cluster.local
  port: 9000
  endpoint: "http://minio.minio.svc.cluster.local:9000"
  # Bucket for COELHONexus artifacts (ingestion/, synth/, planner/, llm/).
  # Read via os.environ["MINIO_BUCKET_COELHONEXUS"] in storage/credentials.
  bucket: "coelhonexus"

redis:
  # In-cluster ClusterIP service (redis-master.redis)
  host: redis-master.redis.svc.cluster.local
  port: 6379

postgresql:
  # In-cluster access (same K3s cluster as COELHOCloud)
  host: postgresql.postgresql.svc.cluster.local
  port: 5432
  user: postgres
  database: coelhonexus

neo4j:
  # In-cluster ClusterIP service (neo4j.neo4j); Bolt on 7687
  uri: "bolt://neo4j.neo4j.svc.cluster.local:7687"
  # Credentials loaded from secret (NEO4J_USERNAME, NEO4J_PASSWORD)

qdrant:
  # In-cluster ClusterIP service (qdrant.qdrant); HTTP REST on 6333, gRPC on 6334
  url: "http://qdrant.qdrant.svc.cluster.local:6333"
  port: 6333

elasticsearch:
  # In-cluster ClusterIP service (elasticsearch-es-http.elasticsearch).
  # COELHO Cloud's ECK-operator deployment exposes HTTPS by default (self-signed
  # certs); the AsyncElasticsearch client in app.py uses verify_certs=False so
  # the self-signed cert is accepted. Service was renamed during the v2 rewrite
  # (was elasticsearch-master in v1).
  host: "https://elasticsearch-es-http.elasticsearch.svc.cluster.local:9200"
  username: "elastic"
  # Password loaded from secret (ELASTICSEARCH_PASSWORD)

# Proxy configuration for YouTube Transcript API (WARP + Tor fallback)
# In-cluster ClusterIP services
proxy:
  warp:
    # In-cluster ClusterIP service (warp.warp); auth credentials from secret
    host: "warp.warp.svc.cluster.local"
    port: 1080
  tor:
    # In-cluster ClusterIP service (tor.tor); no auth
    host: "tor.tor.svc.cluster.local"
    port: 9150

# Playwright CDP for browser automation (bypasses IP blocking)
# COELHO Cloud's playwright module deploys SEPARATE Services per mode (renamed
# during v2 rewrite — was a single `playwright` service in v1):
#   playwright-headed   :9222  (chromium with noVNC sidecar, displayable)
#   playwright-headless :9224  (chromedp/headless-shell, no display)
playwright:
  cdp_headless: "http://playwright-headless.playwright.svc.cluster.local:9224"
  cdp_headed: "http://playwright-headed.playwright.svc.cluster.local:9222"

# Embedding model (NVIDIA NIM API — see docs/NVIDIA-NIM-EMBEDDING-MODELS.md)
# Change model here to switch. MUST re-ingest all data after changing (vectors are incompatible across models).
embedding:
  model: "nvidia/llama-nemotron-embed-1b-v2"  # 2048d, 8K context, best quality

# Knowledge Distiller pipeline tunables.
# `useClassicalMap` toggles the planner's MAP step between:
#   "1" / "true" → classical pipeline (Xinference-replaced NIM rotator embed
#                  + community_detection + KeyLLM via rotator). Deterministic,
#                  ~30s per study, no LLM rate-limit risk on 11 shards.
#   "0" / "false" → legacy LLM-based per-shard labeling via the dd-all rotator.
#                   Slower (~3 min), better label quality on shard names but
#                   prone to 429 cascades and timeouts on free-tier providers.
# See docs/KD-PLANNER-MAP-OPTIMIZATION.md §5 for the full rationale.
dd:
  useClassicalMap: "1"
  # Phase 1.3 (2026-05-13): when "1", routes the synth grader through
  # services/knowledge/grader_classical.py — deterministic per-dim scorers
  # for 6/9 grader dims, plus stubs for assumption_match, complexity_
  # appropriate, market_analysis (Phase 1.2 will replace stubs). Drop-in
  # GraderEvaluation shape so Self-Refine loop + best-of-N argmax work
  # unchanged. Default "0" keeps the legacy LLM grader; flip to "1" after
  # A/B validation via /api/v1/knowledge/debug/grader_compare confirms
  # the classical scorer agrees on representative chapters. See
  # docs/KD-SYNTH-LLM-TO-CLASSICAL-MAY2026.md Phase 1.
  useClassicalGrader: "1"
  # Phase 2.1 (2026-05-13): when "1", replaces the post-synth critic's
  # per-chapter LLM faithfulness call (OP-45) with an embedding-similarity
  # heuristic via the dd-embed rotator (services/knowledge/critic_classical.py).
  # citation_coverage + code_syntax_valid stay deterministic regardless of
  # this flag (they always were). Default "0" keeps the legacy LLM critic;
  # flip after A/B validation via /api/v1/knowledge/debug/critic_compare.
  # Phase 2.2 will upgrade to host-side MiniCheck/AlignScore if needed.
  useClassicalCritic: "1"
  # Phase 3.1 (2026-05-13): when "1", routes Phase A outline generation
  # through services/knowledge/outline_classical.py — deterministic
  # markdown-header section extraction (zero LLM for naming) + 1 small
  # LLM call for the creative challenges+flashcards artifacts. ~80%
  # token reduction on the outline step, same ChapterOutline shape so
  # Phase B/C/D work unchanged. Default "0" keeps the legacy single
  # large LLM call (OUTLINE_PROMPT); flip after A/B validation via
  # /api/v1/knowledge/debug/outline_compare confirms section structure
  # quality on representative chapters.
  useClassicalOutline: "1"
  # Phase 4 (2026-05-13): when "1", Self-Refine loop attempts deterministic
  # patches on patchable Issue dims (signal_to_noise / citation_integrity /
  # assumption_match) BEFORE the LLM adjustment+re-synth cycle. If patches
  # clear the acceptance threshold on re-grade, the next re-synth iter is
  # skipped entirely (2 LLM calls saved); otherwise the adjustment text is
  # generated from per-dim templates instead of the LLM ADJUSTMENT_PROMPT
  # call (1 LLM call saved). See services/knowledge/refiner_classical.py
  # and docs/KD-SYNTH-LLM-TO-CLASSICAL-MAY2026.md Phase 4. Depends on
  # DD_USE_CLASSICAL_GRADER for reliably labeled Issue dimensions. Default
  # "0" keeps the legacy LLM-only refine path; flip after A/B validation
  # via /api/v1/knowledge/debug/refiner_compare.
  useClassicalRefiner: "1"
  # Phase 5 (2026-05-13): when "1", routes the per-chapter curator pass
  # through services/knowledge/curator_classical.py — deterministic glossary
  # substitution + heading-depth normalization (collapse H4+ to H3) +
  # transition-line deletion. NO LLM call (the curator's irreducibly-creative
  # voice-harmonization pass is dropped; gains ~95% of curator value at 100%
  # token savings). Code-vault sentinels are never touched. Default "0" keeps
  # the legacy CURATOR_PROMPT LLM call; flip after A/B validation via
  # /api/v1/knowledge/debug/curator_compare confirms style normalization
  # matches.
  useClassicalCurator: "1"
  # Phase 5 (2026-05-13): when "1", routes the final summary.md / assembler
  # step through services/knowledge/summary_classical.py — deterministic
  # Python-built header + reading plan + one small-LLM call via the
  # dd-reduce-label rotator for the framing paragraph + market_roadmap +
  # 3-5 money projects only. The reading-plan list never transits the LLM
  # (~70% output-token reduction vs ASSEMBLER_PROMPT). Default "0" keeps the
  # legacy single-call assembler; flip after A/B validation via
  # /api/v1/knowledge/debug/summary_compare.
  useClassicalSummary: "1"
  # Scope B (2026-05-12 night, revised night-late): when "1", section synth
  # routes through the curated `dd-synth` HYBRID pool — Tier 1 reasoning
  # (Kimi K2.6 / GLM-5.1 / MiniMax M2.7 / DeepSeek V4-Flash) for structural-
  # output completeness, Tier 2 non-reasoning frontier (Mistral L3 ×2 /
  # Nemotron-3-super / gpt-oss-120b) for fast fallback, Tier 3 deep tail
  # (Mistral Medium + Small + Llama-4 Maverick) for cooldown absorption.
  # Excludes Gemini 3.x (T<1 infinite-loop bug), Magistral (R-mode default),
  # Cerebras (account 404), SambaNova (paywall), DeepSeek direct (Insufficient
  # Balance), Groq gpt-oss + llama-3.3 (TPM ceilings too tight). The
  # concurrency cap (DD_LLM_GLOBAL_CONCURRENCY) prevents peak parallelism
  # from cascade-exhausting via reasoning-model <think> timeouts.
  # See services/llm_chain.py SYNTH_GROUP.
  useSynthPool: "1"
  # Fix #2 of Phase B/C audit-fail hardening (2026-05-12 night): when "1"
  # AND useSynthPool="1", every chapter pins ONE deployment from SYNTH_GROUP
  # at synth start (deterministic by chapter.number) and uses it for all
  # Phase A/C calls + all refine iters. Gives the refiner continuity to act
  # on surgical missing-hash feedback (same model sees its own previous
  # attempts → converges in 2-3 iters instead of random-walking across
  # rotator members for 5+). See pick_synth_deployment / build_synth_pinned_
  # chain in services/llm_chain.py. Default "1" since Fix #2 is the
  # convergence answer for the audit-fail loop empirically observed.
  pinChapterModel: "1"
  # Scope B (2026-05-12 night): global LLM concurrency cap PER PROCESS. Free-tier
  # provider RPMs sum to ~170 across Groq/NIM/Mistral/Gemini; safety-factor 0.5
  # = ~10 sustainable concurrent calls cluster-wide. Without this cap, peak
  # parallel synth (~7 chapters × 8 sections × N iters = 16-48 concurrent calls)
  # exceeds the budget and triggers the cascade-exhaustion mode. PER-PROCESS:
  # Celery prefork concurrency=5 × this cap = effective cluster-wide ceiling.
  # See _get_llm_semaphore() in graphs/knowledge/helpers.py.
  llmGlobalConcurrency: "10"
  # R8 (global community_detection) + R8b (file-cap sub-split) status:
  # - Docker (1318 files): WORKS — silhouette 0.522 (record), 10 balanced
  #   chapters, max 18.9%, 48 orphans (vs 103 per-shard).
  # - Terragrunt (440 files): REGRESSED — R8b's plain-KMeans(k=2) sub-split
  #   produced a degenerate 7+1 partition (253-file sub-meta still 63% of
  #   corpus, no recursion → mega junk drawer). Validated 2026-05-12 on
  #   study 8e88137d.
  # Default REVERTED to "0" pending the adaptive-k KMeansConstrained
  # sub-split fix in reduce_cluster.py. R8+R8b remain opt-in for advanced
  # tuning; per-shard mode (label_shards_classical, the validated stable
  # path) is the safe default for both Docker and Terragrunt.
  globalMap: "0"

  # Phase 1 rotator rebuild (2026-05-14):
  # When "1" (default), services/llm_chain.py builds the LiteLLM Router's
  # model_list from live provider /v1/models discovery + 3-source benchmark
  # composite ranking instead of the static hand-curated catalog. Falls back
  # to the static catalog on ANY error (discovery network failure, benchmark
  # source down, empty results) so studies never break on catalog issues.
  #
  # Set "0" to force-disable and use the static catalog (debugging fallback).
  #
  # Architecture: discovery.list_all_alive_models() → benchmarks.rank_for_step(step)
  #            → top-K cut per step → _record_to_entry() → LiteLLM model_list dict
  # Per-step top-K: dd-all=30, dd-synth=12, dd-reduce-label=10.
  # dd-keylm + dd-embed stay STATIC by design (tiny LMs + single embedding model).
  dynamicCatalog: "1"

  # Phase 2 — ParetoBandit ALWAYS-ON adaptive routing (2026-05-14):
  # The bandit runs from day 1 via top-K cascade in helpers._invoke_structured_with_fallback.
  # Warm-start from the benchmark composite means Day-1 picks == Phase 1 picks; learning
  # emerges over time from per-call reward signal (success / schema_valid / latency / hash_recall /
  # error_class) combined with river.drift.ADWIN regime-shift detection.
  #
  # Single escape hatch only — set `paretoBanditDisable: "1"` to fully disable
  # (emergency rollback to Phase 1 simple-shuffle). Default "0" = bandit runs.
  #
  # See docs/KD-ROTATOR-ALWAYS-ON-BANDIT-MAY2026.md for the full architecture.
  paretoBanditDisable: "0"

  # Phase D (2026-05-23 — same doc):
  # When "1", refine uses a deterministic softmax-sharpened soft-membership
  # resolver for boundary docs whose sharpened posterior >= 0.60, falling
  # back to the bandit LLM-judge only for the uncertain residual. Cuts
  # ~85% of LLM-judge calls on LangChain-scale corpora (168s → ~30s for
  # 405 boundary docs) at ~3-5pp accuracy regression vs pure LLM-judge.
  # Trade-off worth it at scale per Wiley 2025 boundary-resolver comparison.
  refineUseGmm: "1"

  # chapter_propose Optimal-Stopping (CGES): if sample 0 emits ≥ stop-floor
  # proposals, ship without firing remaining N-1. "true"/"1"/"yes"/"on" enable.
  proposeOptimalStopping: "true"

  # sawc_derive Optimal-Stopping: same shape as proposeOptimalStopping above.
  sawcDeriveOptimalStopping: "true"

  # Per-study chapter concurrency. 2 = the empirical sweet spot for rotator
  # rate-limit headroom; roll back to "1" if 429 cascades resume.
  studySem: "2"

# SearXNG — in-cluster metasearch used by Knowledge Distiller to resolve
# official documentation URLs (and any future web-search need). Internal DNS
# avoids Tailscale TLS overhead on every query. Service lives in the
# `searxng` namespace and is already deployed outside this chart.
searxng:
  url: "http://searxng.searxng.svc.cluster.local:8080"

# Secret containing credentials (created by upload_env_to_k3d.sh)
secretName: coelhonexus-secret

# BYOK LLM credential store (apps/fastapi/domains/llm/credentials).
# Provider keys are normally entered through the global /settings UI and stored
# Fernet-encrypted in MinIO (llm/credentials.enc) — they survive skaffold/pod
# restarts via the MinIO PVC with NO Helm config. This block only governs the
# OPTIONAL key-encryption-key (KEK) hardening + first-boot env import.
llmCredentials:
  # true → this chart provisions a Helm-managed Secret holding a stable
  # KD_CREDS_KEY (the Fernet KEK), generated ONCE and retained across upgrades
  # (lookup-retain idiom), injected into fastapi + celery. Separates the unlock
  # key from the ciphertext (stronger than the in-MinIO autogen KEK).
  #
  # DEFAULT false: when KD_CREDS_KEY is unset the store auto-generates + persists
  # a KEK inside MinIO, so zero-config persistence already works. Turn this on
  # for a FRESH install to get KEK separation. Enabling it AFTER keys were saved
  # is safe — the store transparently migrates existing ciphertext to the new
  # KEK on first read.
  manageKek: false
  kekSecretName: coelhonexus-creds-kek
  kekSecretKey: kd-creds-key
  # true → sets KD_CREDS_IMPORT_ENV=1 so the process imports any provider keys
  # still present in the environment into the encrypted store on boot (lets you
  # then drop the plaintext configmap/secret entries). Default off.
  importEnvKeys: false

# Secret key mappings (upload_env_to_k3d.sh converts UPPER_CASE to lower-case)
# Maps secret keys back to expected environment variable names
secretMappings:
  - envName: REDIS_PASSWORD
    key: redis-password
  - envName: NEO4J_USERNAME
    key: neo4j-username
  - envName: NEO4J_PASSWORD
    key: neo4j-password
  - envName: AWS_ACCESS_KEY_ID
    key: aws-access-key-id
  - envName: AWS_SECRET_ACCESS_KEY
    key: aws-secret-access-key
  # ---------------------------------------------------------------------------
  # LLM rotator provider API keys — now supplied by the USER through the global
  # /settings UI (BYOK), encrypted at rest in MinIO (llm/credentials.enc), NOT
  # injected from Helm. resolve_key() reads the store; with these mappings
  # commented out there is no env fallback, so the rotator uses ONLY UI-entered
  # keys. The values themselves are NOT erased — they remain in
  # coelhonexus-secret / your .env. Uncomment any line to restore the env path
  # (or one-time: set llmCredentials.importEnvKeys=true to migrate them into the
  # store on next boot). NIM (NVIDIA_API_KEY) powers mandatory embeddings/rerank
  # too, so enter it in /settings before running a DD pipeline.
  # - envName: GROQ_API_KEY
  #   key: groq-api-key
  # - envName: NVIDIA_API_KEY
  #   key: nvidia-api-key
  # - envName: SAMBANOVA_API_KEY
  #   key: sambanova-api-key
  # - envName: CEREBRAS_API_KEY
  #   key: cerebras-api-key
  # - envName: MISTRAL_API_KEY
  #   key: mistral-api-key
  # - envName: GOOGLE_API_KEY
  #   key: google-api-key
  # - envName: DEEPSEEK_API_KEY
  #   key: deepseek-api-key
  # ---------------------------------------------------------------------------
  - envName: ELASTICSEARCH_PASSWORD
    key: elasticsearch-password
  - envName: QDRANT_API_KEY
    key: qdrant-api-key
  - envName: LANGFUSE_PUBLIC_KEY
    key: langfuse-public-key
  - envName: LANGFUSE_SECRET_KEY
    key: langfuse-secret-key
  - envName: LANGFUSE_HOST
    key: langfuse-host
  - envName: POSTGRES_PASSWORD
    key: postgres-password
  - envName: WARP_PROXY_USER
    key: warp-proxy-user
  - envName: WARP_PROXY_PASS
    key: warp-proxy-pass
  - envName: EXA_API_KEY
    key: exa-api-key
  - envName: TAVILY_API_KEY
    key: tavily-api-key
  - envName: JINA_API_KEY
    key: jina-api-key
  - envName: LINKUP_API_KEY
    key: linkup-api-key
  # Flower basic auth — only consumed when flower.basicAuth.enabled=true
  - envName: FLOWER_BASIC_AUTH
    key: flower-basic-auth

# Registry configuration - uses k3d COELHOCloud Registry (same as Skaffold)
registry:
  url: coelho-cloud-registry:5000
  # k3d registry doesn't need authentication
  imagePullSecret: ""

# Image configurations
# Uses k3d in-cluster registry (coelho-cloud-registry:5000) — see registry.url below
# with 'latest' tag and imagePullPolicy: Always


# FastAPI unified ML backend (includes River incremental and Sklearn batch training)
# Uses k3d COELHOCloud Registry (same as Skaffold)
fastapi:
  image: localhost:5001/coelhonexus-fastapi:latest
  imagePullPolicy: Always  # Always pull latest from Skaffold builds
  replicas: 1
  resources:
    requests:
      memory: "2Gi"
      cpu: "500m"
    limits:
      memory: "8Gi"
      cpu: "2000m"
  portsSettings:
    ports:
      - name: http
        port: 8000
        targetPort: 8000
        nodePort: 30020
        protocol: TCP
    type: LoadBalancer
  # Probe execution order: startup -> liveness + readiness
  # startupProbe runs ONLY during startup, disables liveness/readiness until success
  startupProbeSettings:
    startupProbe:
      httpGet:
        path: /health
        port: 8000
      failureThreshold: 30      # 30 x 10s = 300s max startup time
      periodSeconds: 10
  livenessProbeSettings:
    livenessProbe:
      httpGet:
        path: /health
        port: 8000
      initialDelaySeconds: 0    # Starts immediately after startup probe passes
      periodSeconds: 15
      failureThreshold: 3
  readinessProbeSettings:
    readinessProbe:
      httpGet:
        path: /health
        port: 8000
      initialDelaySeconds: 0    # Starts immediately after startup probe passes
      periodSeconds: 5
      failureThreshold: 3

# Celery worker (background tasks — same image as FastAPI, different command)
celery:
  enabled: true
  replicas: 1
  # 2026-05-12 night: concurrency lowered 5→2 after Scope B E2E surfaced
  # ForkPoolWorker SIGKILL storms. Parent celery process loads numba/transformers/
  # langchain/litellm/sklearn at ~1.8GB RSS; every forked child inherits that
  # baseline via COW and trips the worker_max_memory_per_child=2GB recycling
  # guard (infra/celery/service.py) the moment Python refcounting copies pages.
  # With concurrency=5 the pod also exceeded the 4Gi memory limit (5 × 2GB +
  # parent ≈ 11.8GB). concurrency=2 gives 2 in-flight tasks (each chapter's
  # synthesize_chapter task spawns 8 parallel section-synth LLM calls anyway,
  # so 2 celery workers × 8 parallel calls = 16 in-flight LLM calls — already
  # at the DD_LLM_GLOBAL_CONCURRENCY=10 cap which queues the rest).
  concurrency: 2
  # Queue names are environment-suffixed in the deployment template (see
  # k8s/helm/templates/celery/deployment.yaml). Both dev (skaffold) and prod
  # (argocd) share the same Redis broker, but workers only consume their own
  # environment's tasks — no cross-env task stealing.
  # 2026-05-24 — `planner` queue added: the 8-node LangGraph runs on Celery
  # workers (was in-process in FastAPI). See domains/dd/planner/task.py +
  # dispatch.py.
  # 2026-05-26 — `synth` queue added (Bundle 13): the per-chapter synth
  # graph + study orchestrator + book_harmonize now run on Celery too.
  # Same worker pod consumes both queues; Q_SYNTH soft_time_limit=6h so the
  # long-running study orchestrator (~100-120 min for 6-8 chapters) fits.
  # 2026-06-07 — `ycs` queue added (Wave 4 YCS port): hosts
  # extract_{videos,channel,playlist}, ingest_to_qdrant, ingest_to_neo4j,
  # full_channel_pipeline, invalidate_cache. Without this the YCS Source
  # forms 200-OK but tasks sit PENDING forever (no consumer for ycs-{env}).
  queues: "crawler,embedding,llm,planner,synth,default,ycs"
  resources:
    requests:
      memory: "2Gi"
      # 2026-05-24 — bumped from 100m to 500m for Planner queue. UMAP+HDBSCAN
      # in the cluster node + sklearn GMM in refine are CPU-bursty (multi-core
      # numpy under the hood). The cluster step on 777 docs spikes to ~2 cores.
      cpu: "500m"
    # Bumped 4Gi→6Gi 2026-05-12 night: with concurrency=2 + worker_max_memory_
    # per_child=2GB + parent ~1.8GB, peak RSS ≈ 5.8GB. Headroom to 6Gi keeps
    # the cgroup OOM killer out of the picture. Planner adds ~200-400MB transient
    # peak during cluster (numpy + UMAP fit) — still within 6Gi headroom.
    limits:
      memory: "6Gi"
      # 2026-05-24 — bumped 500m→2000m for Planner cluster/refine math.
      # Old cap throttled UMAP fit from ~6s to ~40s on 777-doc corpus.
      cpu: "2000m"

# Flower — Celery monitoring dashboard (UI for the workers above)
# Deployed per-project (was previously in COELHO Cloud shared infra).
# Uses upstream mher/flower image (NOT the FastAPI image) — Flower doesn't
# need app code, it watches broker events and stores task history in a
# Python shelve file. Smaller image, separate CVE surface, no rebuild
# coupling with FastAPI. Single replica enforced — shelve is single-writer.
flower:
  enabled: true
  # PyPI 2.0.1 frozen since 2023-08-13; no newer release as of 2026.
  # mher/flower master tag rebuilt monthly with patches but not released.
  image: mher/flower:2.0.1
  imagePullPolicy: IfNotPresent
  replicas: 1                # DO NOT INCREASE — shelve DB is single-writer.
  # Persistent task history — Flower writes /data/flower.dat (shelve format,
  # NOT SQLite — common doc misread). 1 GiB is wildly oversized for a 10k
  # task ring (~5-50 MB actual) but cheap insurance against ring expansion.
  persistDb: true
  storageSize: "1Gi"
  # Named to match _helpers.tpl coelhonexus.PVCSettings macro (key lookup).
  storageClassName: "local-path"
  maxTasks: 10000                # in-memory task ring; older tasks evict
  purgeOfflineWorkersSeconds: 300  # remove stale worker rows after 5 min
  stateSaveInterval: 10000       # write shelve every 10s (ms)
  # Basic auth — Tailnet IS the trust boundary by default (homelab pattern).
  # Flip on by setting basicAuth.enabled=true AND adding FLOWER_BASIC_AUTH=
  # "user:pass" to coelhonexus-secret via upload_env_to_k3d.sh.
  # Flower's --basic_auth supports comma-separated multi-user.
  basicAuth:
    enabled: false
  resources:
    requests:
      memory: "128Mi"
      cpu: "50m"
    limits:
      memory: "256Mi"
      cpu: "200m"
  # Service config — same pattern as fastapi/web (LoadBalancer + NodePort in
  # production, ClusterIP in local; switched by _helpers.tpl). Production
  # NodePorts are 23000-23019; we pick 30022 to align with the pattern
  # (fastapi=30020, web=30021, flower=30022).
  portsSettings:
    ports:
      - name: http
        port: 5555
        targetPort: 5555
        nodePort: 30022
        protocol: TCP
    type: LoadBalancer
  # Probes — Flower's /healthcheck is auth-exempt and returns "OK".
  # Officially documented; no liveness flapping during startup.
  livenessProbeSettings:
    livenessProbe:
      httpGet:
        path: /healthcheck
        port: 5555
      initialDelaySeconds: 15
      periodSeconds: 30
      failureThreshold: 3
  readinessProbeSettings:
    readinessProbe:
      httpGet:
        path: /healthcheck
        port: 5555
      initialDelaySeconds: 5
      periodSeconds: 10
      failureThreshold: 3

# FastHTML frontend (Python + python-fasthtml + HTMX + PWA).
# Replaced the legacy Go web frontend on 2026-05-09 — same /static, same
# /kd/inspect, same /api/test contract. NodePort 30023 retained to avoid
# breaking any external callers that may still reference the old `web` URLs.
fasthtml:
  image: localhost:5001/coelhonexus-fasthtml:latest
  imagePullPolicy: Always
  replicas: 1
  resources:
    requests:
      memory: "256Mi"
      cpu: "100m"
    limits:
      memory: "512Mi"
      cpu: "500m"
  portsSettings:
    ports:
      - name: http
        port: 3000
        targetPort: 3000
        nodePort: 30023        # web=30021, flower=30022, fasthtml=30023
        protocol: TCP
    type: LoadBalancer
  startupProbeSettings:
    startupProbe:
      httpGet:
        path: /health
        port: 3000
      failureThreshold: 12     # 12 x 5s = 60s — uvicorn cold start + reload watcher
      periodSeconds: 5
  livenessProbeSettings:
    livenessProbe:
      httpGet:
        path: /health
        port: 3000
      initialDelaySeconds: 0
      periodSeconds: 10
      failureThreshold: 3
  readinessProbeSettings:
    readinessProbe:
      httpGet:
        path: /health
        port: 3000
      initialDelaySeconds: 0
      periodSeconds: 5
      failureThreshold: 3
