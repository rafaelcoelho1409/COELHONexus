# =============================================================================
# GITLAB CI/CD - COELHONexus
# =============================================================================
# Pipeline: git push -> GitLab CI -> Docker build -> ArgoCD Image Updater
#
# Fully automated - just push to master!
# Same workflow as Skaffold: build -> push -> done (ArgoCD handles deploy)
#
# Registry: k3d COELHOCloud Registry (coelho-cloud-registry:5000)
# Deploy: ArgoCD Image Updater auto-detects new images and syncs
#
# No CI/CD variables needed!
# =============================================================================

stages:
  - build
  # Deploy handled by ArgoCD Image Updater (auto-detects new images)

variables:
  # k3d COELHOCloud Registry (same as Skaffold uses)
  REGISTRY: "coelho-cloud-registry:5000"
  FASTAPI_IMAGE: "${REGISTRY}/coelhonexus-fastapi"
  FASTHTML_IMAGE: "${REGISTRY}/coelhonexus-fasthtml"
  # Docker-in-Docker configuration
  DOCKER_HOST: tcp://docker:2375
  DOCKER_TLS_CERTDIR: ""
  DOCKER_BUILDKIT: "1"

# =============================================================================
# BUILD STAGE (Docker-in-Docker - same as Skaffold)
# =============================================================================

build-fastapi:
  stage: build
  image: docker:28-cli
  services:
    - name: docker:28-dind
      alias: docker
      command: ["dockerd", "--host=tcp://0.0.0.0:2375", "--host=unix:///var/run/docker.sock", "--tls=false", "--insecure-registry=coelho-cloud-registry:5000"]
  only:
    - master
    - main
  before_script:
    - until docker info; do sleep 1; done
  script:
    - echo "Building FastAPI image with Docker (same as Skaffold)..."
    - docker build
      -t ${FASTAPI_IMAGE}:${CI_COMMIT_SHORT_SHA}
      -t ${FASTAPI_IMAGE}:latest
      -f apps/fastapi/Dockerfile.fastapi
      apps/fastapi
    - docker push ${FASTAPI_IMAGE}:${CI_COMMIT_SHORT_SHA}
    - docker push ${FASTAPI_IMAGE}:latest
    - echo "FastAPI image pushed to ${FASTAPI_IMAGE}"

build-fasthtml:
  stage: build
  image: docker:28-cli
  services:
    - name: docker:28-dind
      alias: docker
      command: ["dockerd", "--host=tcp://0.0.0.0:2375", "--host=unix:///var/run/docker.sock", "--tls=false", "--insecure-registry=coelho-cloud-registry:5000"]
  only:
    - master
    - main
  before_script:
    - until docker info; do sleep 1; done
  script:
    - echo "Building FastHTML image with Docker (same as Skaffold)..."
    - docker build
      -t ${FASTHTML_IMAGE}:${CI_COMMIT_SHORT_SHA}
      -t ${FASTHTML_IMAGE}:latest
      -f apps/fasthtml/Dockerfile.fasthtml
      apps/fasthtml
    - docker push ${FASTHTML_IMAGE}:${CI_COMMIT_SHORT_SHA}
    - docker push ${FASTHTML_IMAGE}:latest
    - echo "FastHTML image pushed to ${FASTHTML_IMAGE}"

# =============================================================================
# DEPLOY - Handled by ArgoCD Image Updater
# =============================================================================
# No deploy stage needed!
# ArgoCD Image Updater watches k3d registry and auto-deploys when:
#   1. CI pushes new images to coelho-cloud-registry:5000
#   2. Image Updater detects new digest (update-strategy: digest)
#   3. ArgoCD syncs and restarts pods
#
# This is the same flow as Skaffold - just build, push, done!
