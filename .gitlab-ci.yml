# =============================================================================
# GITLAB CI/CD — COELHONexus (Skaffold-driven build, GitOps deploy)
# =============================================================================
# Pipeline: git push → GitLab CI runs `skaffold build` → ArgoCD Image Updater
# detects new digests in the in-cluster registry → ArgoCD reconciles → rollout.
stages:
  - build
  # No deploy stage: ArgoCD Image Updater detects new digests and syncs.

variables:
  # Docker-in-Docker — Skaffold's `local` builder shells out to `docker build`.
  DOCKER_HOST: tcp://docker:2375
  DOCKER_TLS_CERTDIR: ""
  DOCKER_BUILDKIT: "1"

build:
  stage: build
  # Official Skaffold image — pinned for reproducibility.
  # Bump deliberately when new Skaffold features are needed.
  image:
    name: gcr.io/k8s-skaffold/skaffold:v2.16.1
  services:
    - name: docker:28-dind
      alias: docker
      command:
        - dockerd
        - --host=tcp://0.0.0.0:2375
        - --host=unix:///var/run/docker.sock
        - --tls=false
        # Allow plain-HTTP push to the in-cluster k3d registry.
        - --insecure-registry=localhost:5001
  only:
    - master
    - main
  before_script:
    # Wait for dind to be reachable before invoking docker via Skaffold.
    - until docker info; do sleep 1; done
  script:
    - skaffold build
        --push
        --default-repo=localhost:5001
        --tag=$CI_COMMIT_SHORT_SHA
