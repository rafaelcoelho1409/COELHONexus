apiVersion: skaffold/v4beta13
kind: Config
metadata:
  name: coelhonexus

build:
  # Use 'latest' tag for all images (k3d dev - pods use imagePullPolicy: Always)
  tagPolicy:
    customTemplate:
      template: "latest"
  artifacts:
    # FastAPI ML backend
    - image: coelhonexus-fastapi
      context: apps/fastapi
      docker:
        dockerfile: Dockerfile.fastapi
        noCache: true
      sync:
        manual:
          - src: "**/*.py"
            dest: /app
            strip: ""
  local:
    push: true  # Push to COELHOCloud registry (localhost:5000)
    tryImportMissing: true
    useBuildkit: true
    useDockerCLI: true

# MANIFESTS (v4beta13 structure)
manifests:
  helm:
    releases:
      - name: coelhonexus
        chartPath: ./k3d/helm
        namespace: coelhonexus
        createNamespace: true
        skipBuildDependencies: true  # Dependencies already downloaded
        # No setValueTemplates needed - all image config is in values.yaml
        # FastAPI uses coelhocloud-registry:5000 (cluster internal access)
        # with 'latest' tag and imagePullPolicy: Always

deploy:
  helm:
    flags:
      install:
        - --timeout=10m
        - --wait
      upgrade:
        - --timeout=10m
        - --wait

portForward:
  # FastAPI ML backend
  - resourceType: service
    resourceName: coelhonexus-fastapi
    namespace: coelhonexus
    port: 8000
    localPort: 23000
    address: 0.0.0.0


# NOTE: Ensure docker-buildx is installed when useBuildkit is true
# sh mirror_localhost_tailscale.sh $(for i in {23000..23001}; do echo $i; done)
