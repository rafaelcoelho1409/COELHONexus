apiVersion: skaffold/v4beta13
kind: Config
metadata:
  name: coelhonexus

build:
  # Content-based tag: hashes the build context, so the tag changes whenever
  # source files change. This guarantees:
  #   1. Skaffold rebuilds when sources change (new tag => cache miss)
  #   2. Kubernetes detects image change and rolls out a new pod (tag differs)
  #   3. tryImportMissing can't accidentally pull a stale 'latest' from registry
  #      because the tag itself is unique per content snapshot.
  # Identical builds reuse cache (same tag), so this stays fast.
  tagPolicy:
    sha256: {}
  artifacts:
    # FastAPI ML backend.
    # Image name is fully qualified with `localhost:5001` (k3d host port
    # mapping → coelho-cloud-registry container). The cluster also resolves
    # this same address via a containerd mirror configured in COELHO Cloud's
    # k3d module (see ~/COELHOCloud/infrastructure/modules/k3d/files/
    # registries.yaml.tpl) — so the artifact image string is identical to
    # the deployed pod's image string, which Skaffold's sync matcher
    # requires for hot-reload to work. No setValueTemplates rewrite needed.
    - image: localhost:5001/coelhonexus-fastapi
      context: apps/fastapi
      docker:
        dockerfile: Dockerfile.fastapi
        noCache: false  # Enable layer caching for faster rebuilds
      sync:
        # Hot-reload: sync Python files directly to container (no rebuild)
        # Requires: skaffold dev (not skaffold run)
        #
        # Skaffold's manual sync is ALL-OR-NOTHING: if any changed file in
        # a debounce batch doesn't match a `src` glob, the whole batch
        # falls back to rebuild. So we list everything a normal edit pass
        # might touch — .py, .yaml, .json, .toml — and let .dockerignore
        # filter the noise (__pycache__/*.pyc et al) BEFORE Skaffold's
        # watcher even sees it. Without this combination, the .pyc files
        # Python generates as a side effect of any `import` would race
        # into the batch and trigger a 2-3 minute rebuild on every save.
        manual:
          - src: "**/*.py"
            dest: /app
          - src: "**/*.yaml"
            dest: /app
          - src: "**/*.yml"
            dest: /app
          - src: "**/*.json"
            dest: /app
          - src: "**/*.toml"
            dest: /app
    # FastHTML frontend (Python + python-fasthtml + HTMX + PWA).
    # Replaced the legacy Go web frontend on 2026-05-09 — see
    # apps/fasthtml/ for the full-parity port. Same fully-qualified-image
    # pattern as fastapi above.
    - image: localhost:5001/coelhonexus-fasthtml
      context: apps/fasthtml
      docker:
        dockerfile: Dockerfile.fasthtml
        noCache: false
      sync:
        # Same all-or-nothing reasoning as fastapi above — list every
        # source file type so the watcher never falls back to rebuild on
        # an edit-pass batch. apps/fasthtml/.dockerignore (added in the
        # same commit) excludes __pycache__/*.pyc + editor swapfiles so
        # they don't even enter the build context.
        manual:
          - src: "**/*.py"
            dest: /app
          - src: "static/**"
            dest: /app/static
            strip: "static/"
          - src: "**/*.yaml"
            dest: /app
          - src: "**/*.yml"
            dest: /app
          - src: "**/*.json"
            dest: /app
          - src: "**/*.toml"
            dest: /app
  local:
    # Push to COELHO Cloud k3d registry at localhost:5001 (k3d host port).
    # The cluster resolves the SAME address via a containerd mirror
    # (registries.yaml in ~/COELHOCloud/infrastructure/modules/k3d/), so
    # `localhost:5001/foo:bar` works as a single image name end-to-end —
    # host pushes there, kubelet pulls from there. Single source of truth,
    # Skaffold's sync matcher matches, hot-reload works.
    push: true
    # IMPORTANT: tryImportMissing=false forces Skaffold to always build from
    # source. With true, Skaffold would silently import an existing image with
    # the same name+tag from the registry — which masked code changes when
    # combined with the old 'latest' tag policy. Combined with sha256 tags
    # above, this guarantees every build reflects current source code.
    tryImportMissing: false
    useBuildkit: true
    useDockerCLI: true

# MANIFESTS (v4beta13 structure)
manifests:
  helm:
    releases:
      - name: coelhonexus
        chartPath: ./k8s/helm
        namespace: coelhonexus-dev
        createNamespace: true
        skipBuildDependencies: true
        # Enable Skaffold image tracking for hot-reload sync.
        #
        # IMAGE_FULLY_QUALIFIED_<name> = "<artifact-image>:<sha256-tag>".
        # Variable name uses the artifact image with non-alphanumerics
        # replaced by underscores — so `localhost:5001/coelhonexus-fastapi`
        # becomes `localhost_5001_coelhonexus_fastapi`.
        #
        # The pod's deployed image string equals what Skaffold pushed
        # (no rewrite), so Skaffold's sync matcher finds the pod and
        # hot-reload works. The cluster's containerd mirror handles
        # `localhost:5001` → in-cluster registry transparently.
        setValueTemplates:
          fastapi.image: "{{.IMAGE_FULLY_QUALIFIED_localhost_5001_coelhonexus_fastapi}}"
          fasthtml.image: "{{.IMAGE_FULLY_QUALIFIED_localhost_5001_coelhonexus_fasthtml}}"
          environment: local  # Enables --reload in uvicorn for hot-reload

deploy:
  helm:
    flags:
      install:
        - --timeout=10m
        - --wait
      upgrade:
        - --timeout=10m
        - --wait

portForward:
  # FastAPI ML backend (dev ports: 23020-23039)
  - resourceType: service
    resourceName: coelhonexus-fastapi
    namespace: coelhonexus-dev
    port: 8000
    localPort: 23020
    address: 0.0.0.0
  # Flower — Celery monitoring dashboard
  - resourceType: service
    resourceName: coelhonexus-flower
    namespace: coelhonexus-dev
    port: 5555
    localPort: 23022
    address: 0.0.0.0
  # FastHTML frontend
  - resourceType: service
    resourceName: coelhonexus-fasthtml
    namespace: coelhonexus-dev
    port: 3000
    localPort: 23023
    address: 0.0.0.0


# NOTE: Ensure docker-buildx is installed when useBuildkit is true
# Development (Skaffold): ports 23020-23039
# sh mirror_localhost_tailscale.sh $(for i in {23020..23023}; do echo $i; done)
# skaffold dev --cache-artifacts=false --no-prune=false --auto-sync=false --auto-build=false
# # press b (build) or s (sync) 

#
# Production (ArgoCD): ports 23000-23019
# kubectl port-forward -n coelhonexus svc/coelhonexus-fastapi 23000:8000 &
# kubectl port-forward -n coelhonexus svc/coelhonexus-fasthtml 23001:3000 &