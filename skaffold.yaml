apiVersion: skaffold/v4beta13
kind: Config
metadata:
  name: coelhonexus

build:
  # Content-based tag: hashes the build context, so the tag changes whenever
  # source files change. This guarantees:
  #   1. Skaffold rebuilds when sources change (new tag => cache miss)
  #   2. Kubernetes detects image change and rolls out a new pod (tag differs)
  #   3. tryImportMissing can't accidentally pull a stale 'latest' from registry
  #      because the tag itself is unique per content snapshot.
  # Identical builds reuse cache (same tag), so this stays fast.
  tagPolicy:
    sha256: {}
  artifacts:
    # FastAPI ML backend
    - image: coelhonexus-fastapi
      context: apps/fastapi
      docker:
        dockerfile: Dockerfile.fastapi
        noCache: false  # Enable layer caching for faster rebuilds
      sync:
        # Hot-reload: sync source files directly to container (no rebuild).
        # Requires: skaffold dev (not skaffold run).
        #
        # The sync rule list MUST cover every file Claude (or you) routinely
        # edit during dev — anything inside `apps/fastapi/` that ISN'T
        # matched here triggers a full Docker rebuild instead. The Dockerfile
        # itself, pyproject.toml, requirements.txt, and entrypoint.sh are
        # intentionally NOT synced — those need a real rebuild.
        manual:
          # Python source — hot-reloaded by uvicorn --reload
          - src: "**/*.py"
            dest: /app
          # Curated catalog (sources.yaml) — read at FastAPI startup;
          # changes here do not need a rebuild, just a uvicorn reload.
          - src: "files/**"
            dest: /app
          # Helper / test / fixture data (e.g. *.json prompts, *.yaml configs)
          - src: "**/*.yaml"
            dest: /app
          - src: "**/*.yml"
            dest: /app
          - src: "**/*.json"
            dest: /app
    # Web frontend (Go + Templ + HTMX + PWA)
    - image: coelhonexus-web
      context: apps/web
      docker:
        dockerfile: Dockerfile.web
        noCache: false
      sync:
        manual:
          - src: "static/**"
            dest: /app/static
            strip: "static/"
          - src: "**/*.go"
            dest: /app
            strip: ""
          - src: "**/*.templ"
            dest: /app
            strip: ""
  local:
    push: true  # Push to COELHOCloud registry (localhost:5000)
    # IMPORTANT: tryImportMissing=false forces Skaffold to always build from
    # source. With true, Skaffold would silently import an existing image with
    # the same name+tag from the registry — which masked code changes when
    # combined with the old 'latest' tag policy. Combined with sha256 tags
    # above, this guarantees every build reflects current source code.
    tryImportMissing: false
    useBuildkit: true
    useDockerCLI: true

# MANIFESTS (v4beta13 structure)
manifests:
  helm:
    releases:
      - name: coelhonexus
        chartPath: ./k8s/helm
        namespace: coelhonexus-dev
        createNamespace: true
        skipBuildDependencies: true
        # Enable Skaffold image tracking for hot-reload sync
        setValueTemplates:
          fastapi.image: "{{.IMAGE_FULLY_QUALIFIED_coelhonexus_fastapi}}"
          web.image: "{{.IMAGE_FULLY_QUALIFIED_coelhonexus_web}}"
          environment: local  # Enables --reload in uvicorn for hot-reload

deploy:
  helm:
    flags:
      install:
        - --timeout=10m
        - --wait
      upgrade:
        - --timeout=10m
        - --wait

portForward:
  # FastAPI ML backend (dev ports: 23020-23039)
  - resourceType: service
    resourceName: coelhonexus-fastapi
    namespace: coelhonexus-dev
    port: 8000
    localPort: 23020
    address: 0.0.0.0
  # Web frontend
  - resourceType: service
    resourceName: coelhonexus-web
    namespace: coelhonexus-dev
    port: 3000
    localPort: 23021
    address: 0.0.0.0


# NOTE: Ensure docker-buildx is installed when useBuildkit is true
# Development (Skaffold): ports 23020-23039
# sh mirror_localhost_tailscale.sh $(for i in {23020..23022}; do echo $i; done)
#
# Recommended dev command for fast Claude-Code-style iteration:
#   skaffold dev --cache-artifacts=false --no-prune=false --auto-build=false
#
#   --auto-build=false : DO NOT auto-rebuild Docker images on file changes.
#                        Only rebuild on manual `b` keypress. This prevents
#                        rebuild storms when Claude (or you) edit several
#                        files quickly. Hot-reload sync still fires on
#                        every file change matching the sync rules above —
#                        --auto-sync remains true (default).
#   --auto-sync=true   : (default) sync matched files to running pod immediately.
#
# Press `b` to trigger a manual rebuild when you've changed Dockerfile /
# pyproject.toml / requirements.txt / entrypoint.sh. Otherwise let sync
# handle everything.

#
# Production (ArgoCD): ports 23000-23019
# kubectl port-forward -n coelhonexus svc/coelhonexus-fastapi 23000:8000 &
# kubectl port-forward -n coelhonexus svc/coelhonexus-web 23001:3000 &
