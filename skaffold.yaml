apiVersion: skaffold/v4beta13
kind: Config
metadata:
  name: coelhonexus

build:
  # Use 'latest' tag for all images (k3d dev - pods use imagePullPolicy: Always)
  tagPolicy:
    customTemplate:
      template: "latest"
  artifacts:
    # FastAPI ML backend
    - image: coelhonexus-fastapi
      context: apps/fastapi
      docker:
        dockerfile: Dockerfile.fastapi
        noCache: false  # Enable layer caching for faster rebuilds
      sync:
        # Hot-reload: sync Python files directly to container (no rebuild)
        # Requires: skaffold dev (not skaffold run)
        manual:
          - src: "**/*.py"
            dest: /app
    # Web frontend (Go + Templ + HTMX + PWA)
    - image: coelhonexus-web
      context: apps/web
      docker:
        dockerfile: Dockerfile.web
        noCache: false
      sync:
        manual:
          - src: "static/**"
            dest: /app/static
            strip: "static/"
          - src: "**/*.go"
            dest: /app
            strip: ""
          - src: "**/*.templ"
            dest: /app
            strip: ""
  local:
    push: true  # Push to COELHOCloud registry (localhost:5000)
    tryImportMissing: true
    useBuildkit: true
    useDockerCLI: true

# MANIFESTS (v4beta13 structure)
manifests:
  helm:
    releases:
      - name: coelhonexus
        chartPath: ./k8s/helm
        namespace: coelhonexus
        createNamespace: true
        skipBuildDependencies: true
        # Enable Skaffold image tracking for hot-reload sync
        setValueTemplates:
          fastapi.image: "{{.IMAGE_FULLY_QUALIFIED_coelhonexus_fastapi}}"
          web.image: "{{.IMAGE_FULLY_QUALIFIED_coelhonexus_web}}"

deploy:
  helm:
    flags:
      install:
        - --timeout=10m
        - --wait
      upgrade:
        - --timeout=10m
        - --wait

portForward:
  # FastAPI ML backend
  - resourceType: service
    resourceName: coelhonexus-fastapi
    namespace: coelhonexus
    port: 8000
    localPort: 23000
    address: 0.0.0.0
  # Web frontend
  - resourceType: service
    resourceName: coelhonexus-web
    namespace: coelhonexus
    port: 3000
    localPort: 23001
    address: 0.0.0.0


# NOTE: Ensure docker-buildx is installed when useBuildkit is true
