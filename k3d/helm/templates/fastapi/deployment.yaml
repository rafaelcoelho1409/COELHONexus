{{- $appName := "fastapi" -}}
{{- $appConfig := index $.Values $appName }}

apiVersion: apps/v1
{{- include "coelhonexus.DeploymentSettings" (dict "appName" $appName "root" .) | nindent 0 }}
spec:
  replicas: {{ $appConfig.replicas }}
{{- include "coelhonexus.DeploymentSpecSettings" (dict "appName" $appName "root" .) | nindent 2 }}
{{- include "coelhonexus.DeploymentResources" (dict "appName" $appName "root" .) | nindent 10}}
{{- include "coelhonexus.ProbeSettings" (dict "appName" $appName "root" .) | nindent 10 }}
        # Sidecar: PO Token provider for yt-dlp (bypasses YouTube bot detection)
        - name: bgutil-pot
          image: brainicism/bgutil-ytdlp-pot-provider:1.3.1
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 4416
              protocol: TCP
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            tcpSocket:
              port: 4416
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            tcpSocket:
              port: 4416
            initialDelaySeconds: 5
            periodSeconds: 10
