apiVersion: v1
{{- include "coelhonexus.ConfigMapSettings" (dict "appName" "fastapi" "root" .) | nindent 0}}
data:
  {{- include "coelhonexus.commonEnvVars" . | nindent 2 }}
  # MinIO/S3 credentials for MLflow artifact storage
  AWS_ACCESS_KEY_ID: "{{ .Values.minio.rootUser }}"
  AWS_SECRET_ACCESS_KEY: "{{ .Values.minio.rootPassword }}"
  AWS_DEFAULT_REGION: "us-east-1"
  # Redis for live model caching (real-time predictions during training)
  REDIS_URL: "redis://{{ .Release.Name }}-redis-master:6379"
