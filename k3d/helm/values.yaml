# Environment configuration
# 'local' = Skaffold local development (no registry prefix)
# 'production' = ArgoCD with k3d built-in registry
environment: local

# Monitoring - ServiceMonitors for COELHOCloud's Prometheus
monitoring:
  enabled: true

# External services (COELHOCloud infrastructure)
# Credentials are loaded from coelhonexus-secret (upload via upload_env_to_k3d.sh)
minio:
  host: minio.minio
  port: 9000

redis:
  host: redis-master.redis
  port: 6379

# Secret containing credentials (created by upload_env_to_k3d.sh)
secretName: coelhonexus-secret

# Registry configuration - uses COELHOCloud's k3d registry
registry:
  url: coelhocloud-registry:5000
  # ImagePullSecret not needed for k3d insecure registry
  imagePullSecret: ""

# Image configurations
# Uses coelhocloud-registry:5000 (cluster internal access)
# with 'latest' tag and imagePullPolicy: Always


# FastAPI unified ML backend (includes River incremental and Sklearn batch training)
# Uses COELHOCloud's k3d internal registry for pod access
fastapi:
  image: coelhocloud-registry:5000/coelhonexus-fastapi:latest
  imagePullPolicy: Always  # Always pull latest from Skaffold builds
  replicas: 1
  resources:
    requests:
      memory: "4Gi"
      cpu: "1000m"
    limits:
      memory: "8Gi"
      cpu: "2000m"
  portsSettings:
    ports:
      - name: http
        port: 8000
        targetPort: 8000
        nodePort: 30020
        protocol: TCP
    type: LoadBalancer
  livenessProbeSettings:
    livenessProbe:
      httpGet:
        path: /health
        port: 8000
      initialDelaySeconds: 180
      periodSeconds: 30
      failureThreshold: 5
  readinessProbeSettings:
    readinessProbe:
      httpGet:
        path: /health
        port: 8000
      initialDelaySeconds: 120
      periodSeconds: 10
      failureThreshold: 3

# Web frontend (Go + Templ + HTMX + PWA)
web:
  image: coelhocloud-registry:5000/coelhonexus-web:latest
  imagePullPolicy: Always
  replicas: 1
  resources:
    requests:
      memory: "256Mi"
      cpu: "100m"
    limits:
      memory: "512Mi"
      cpu: "500m"
  portsSettings:
    ports:
      - name: http
        port: 3000
        targetPort: 3000
        nodePort: 30021
        protocol: TCP
    type: LoadBalancer
  livenessProbeSettings:
    livenessProbe:
      httpGet:
        path: /health
        port: 3000
      initialDelaySeconds: 30
      periodSeconds: 10
      failureThreshold: 3
  readinessProbeSettings:
    readinessProbe:
      httpGet:
        path: /health
        port: 3000
      initialDelaySeconds: 10
      periodSeconds: 5
      failureThreshold: 3
