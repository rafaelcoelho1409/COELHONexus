# Environment configuration
# 'local' = Skaffold local development (no registry prefix)
# 'production' = ArgoCD with k3d built-in registry
environment: local

# Registry configuration (only used when environment: production)
registry:
  url: coelhonexus-registry:5000
  # ImagePullSecret not needed for k3d insecure registry
  imagePullSecret: ""

# Image configurations
# Note: Skaffold overrides these with local builds during 'skaffold dev'
# ArgoCD Image Updater updates these tags when new images are pushed to registry


# FastAPI unified ML backend (includes River incremental and Sklearn batch training)
# Uses k3d internal registry (coelhonexus-registry:5000) for pod access
fastapi:
  image: coelhonexus-registry:5000/coelhonexus-fastapi:latest
  imagePullPolicy: Always  # Always pull latest from Skaffold builds
  replicas: 1
  resources:
    requests:
      memory: "4Gi"
      cpu: "1000m"
    limits:
      memory: "8Gi"
      cpu: "2000m"
  portsSettings:
    ports:
      - name: http
        port: 8000
        targetPort: 8000
        nodePort: 30020
        protocol: TCP
    type: LoadBalancer
  livenessProbeSettings:
    livenessProbe:
      httpGet:
        path: /health
        port: 8000
      initialDelaySeconds: 180
      periodSeconds: 30
      failureThreshold: 5
  readinessProbeSettings:
    readinessProbe:
      httpGet:
        path: /health
        port: 8000
      initialDelaySeconds: 120
      periodSeconds: 10
      failureThreshold: 3


# Go + Templ + HTMX web frontend
web:
  image: coelhonexus-registry:5000/coelhonexus-web:latest
  imagePullPolicy: Always
  replicas: 1
  resources:
    requests:
      memory: "128Mi"
      cpu: "50m"
    limits:
      memory: "256Mi"
      cpu: "200m"
  portsSettings:
    ports:
      - name: http
        port: 3000
        targetPort: 3000
        nodePort: 30028
        protocol: TCP
    type: LoadBalancer
  livenessProbeSettings:
    livenessProbe:
      httpGet:
        path: /health
        port: 3000
      initialDelaySeconds: 30
      periodSeconds: 15
      failureThreshold: 3
  readinessProbeSettings:
    readinessProbe:
      httpGet:
        path: /health
        port: 3000
      initialDelaySeconds: 15
      periodSeconds: 10
      failureThreshold: 3


# Redis configuration (Bitnami Redis chart)
# Available for application state management if needed
redis:
  enabled: true
  architecture: standalone  # Use 'replication' for high availability
  auth:
    enabled: false  # Disable authentication for simplicity in local k3d
  # Replica configuration (disabled for standalone)
  replica:
    replicaCount: 0
  # Security Context (aligned with COELHOCloud)
  containerSecurityContext:
    enabled: true
    runAsUser: 1001
    runAsNonRoot: true
  podSecurityContext:
    enabled: true
    fsGroup: 1001
  # Network Policy (disabled for homelab)
  networkPolicy:
    enabled: false
  master:
    service:
      type: ClusterIP
      ports:
        redis: 6379
    persistence:
      enabled: true
      storageClass: local-path
      size: 5Gi
      accessModes:
        - ReadWriteOnce
    resources:
      requests:
        cpu: 20m
        memory: 64Mi
      limits:
        memory: 256Mi
  # Redis configuration for application optimization
  commonConfiguration: |-
    # Enable AOF persistence for better durability
    appendonly yes
    appendfsync everysec
    # RDB snapshots (for backup compatibility)
    save 900 1
    save 300 10
    save 60 10000
    # Set max memory and eviction policy
    maxmemory 200mb
    maxmemory-policy allkeys-lru
    # Disable protected mode (internal cluster only)
    protected-mode no
    # Enable keyspace notifications for pub/sub
    notify-keyspace-events Ex
  # Prometheus metrics exporter
  metrics:
    enabled: true
    serviceMonitor:
      enabled: true
      namespace: coelhonexus
      labels:
        release: "coelhonexus"
      interval: 30s
    resources:
      requests:
        cpu: 5m
        memory: 32Mi
      limits:
        memory: 48Mi
    service:
      type: ClusterIP
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9121"


# MinIO Object Storage (S3-compatible) - Official MinIO Chart (https://helm.min.io/)
# Used for storing parquet files and MLflow artifacts
# Data persists in /data/minio on host via K3d volume mount
minio:
  enabled: true
  # Deployment mode
  mode: standalone
  # Root credentials
  rootUser: "minioadmin"
  rootPassword: "minioadmin123"
  # MinIO API Service (S3 endpoint)
  service:
    type: NodePort
    port: "9000"
    nodePort: 30021
  # MinIO Console Service (Web UI)
  consoleService:
    type: NodePort
    port: "9001"
    nodePort: 30022
  # Persistence using pre-created PVC with hostPath (survives skaffold dev Ctrl+C)
  persistence:
    enabled: true
    existingClaim: "minio-hostpath-pvc"
  # Security context - run as root to avoid permission issues with hostPath
  securityContext:
    enabled: false
  containerSecurityContext:
    enabled: false
  # Resource limits - Optimized (actual from COELHOCloud: 2m CPU, 145Mi RAM)
  resources:
    requests:
      cpu: 10m
      memory: 200Mi
    limits:
      memory: 384Mi
  # Go memory limit for better GC behavior
  extraEnvVars:
    - name: GOMEMLIMIT
      value: "350MiB"
  # Replicas (standalone mode = 1)
  replicas: 1
  # Buckets to create on MinIO startup (native MinIO chart provisioning)
  buckets:
    - name: mlflow-artifacts
      policy: none
      purge: false
    - name: lakehouse
      policy: none
      purge: false
  users: []
  policies: []
  customCommands: []
  svcaccts: []
  # Service account
  serviceAccount:
    create: true
    name: "minio-sa"
  # Disable ingress for local development
  ingress:
    enabled: false
  consoleIngress:
    enabled: false
  # Prometheus metrics
  metrics:
    serviceMonitor:
      enabled: true
      public: true
      includeNode: true
      namespace: coelhonexus


# PostgreSQL Database (Bitnami PostgreSQL chart)
# Used by Grafana for metadata storage
# Data persists in /data/postgresql on host via K3d volume mount
postgresql:
  enabled: true
  # Authentication - primary user (also used by MLflow)
  auth:
    postgresPassword: "postgres123"
    username: "mlflow"
    password: "mlflow123"
    database: "mlflow"
  primary:
    service:
      type: ClusterIP
      ports:
        postgresql: 5432
    persistence:
      enabled: true
      existingClaim: "postgresql-hostpath-pvc"
    # Resource limits - Optimized (actual from COELHOCloud: 20m CPU, 172Mi RAM)
    resources:
      requests:
        cpu: 50m
        memory: 200Mi
      limits:
        memory: 384Mi
    # Extra volumes for /var/run/postgresql
    extraVolumes:
      - name: run-postgresql
        emptyDir: {}
    extraVolumeMounts:
      - name: run-postgresql
        mountPath: /var/run/postgresql
    # PostgreSQL configuration (tuned for homelab)
    extendedConfiguration: |
      max_connections = 100
      shared_buffers = 128MB
      effective_cache_size = 384MB
      maintenance_work_mem = 64MB
      checkpoint_completion_target = 0.9
      wal_buffers = 8MB
      default_statistics_target = 100
      random_page_cost = 1.1
      effective_io_concurrency = 200
      work_mem = 2621kB
      min_wal_size = 512MB
      max_wal_size = 2GB
      log_statement = 'ddl'
      log_connections = on
      log_disconnections = on
  # Enable volumePermissions init container to fix hostPath ownership
  volumePermissions:
    enabled: true
    securityContext:
      runAsUser: 0
  # Disable replication for local development
  architecture: standalone
  # Prometheus metrics exporter - Optimized (actual from COELHOCloud: 1m CPU, 15Mi RAM)
  metrics:
    enabled: true
    service:
      type: ClusterIP
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9187"
    serviceMonitor:
      enabled: true
      namespace: coelhonexus
      labels:
        release: "coelhonexus"
      interval: 30s
    resources:
      requests:
        cpu: 5m
        memory: 32Mi
      limits:
        memory: 64Mi


# kube-prometheus-stack configuration (Prometheus + Grafana + Alertmanager)
# Provides comprehensive monitoring and observability for the cluster
# Port mappings changed to avoid conflicts:
#   - Alertmanager: 9093 → 9094 (Kafka controller uses 9093)
kube-prometheus-stack:
  enabled: true
  # Prometheus Operator configuration
  prometheusOperator:
    enabled: true
    resources:
      requests:
        cpu: 5m
        memory: 64Mi
      limits:
        memory: 128Mi
  # Prometheus Server configuration
  prometheus:
    enabled: true
    prometheusSpec:
      # Add cluster label to all metrics (required for kube-prometheus-stack dashboards)
      externalLabels:
        cluster: coelhonexus
      # Scrape interval and evaluation
      scrapeInterval: 30s
      evaluationInterval: 30s
      # Retention period (3 days for local dev)
      retention: 30d
      retentionSize: "9GB"
      # Resource limits for local k3d
      resources:
        requests:
          cpu: 50m
          memory: 1000Mi
        limits:
          memory: 2Gi
      # Storage for metrics
      storageSpec:
        volumeClaimTemplate:
          spec:
            storageClassName: local-path
            accessModes: ["ReadWriteOnce"]
            resources:
              requests:
                storage: 10Gi
      # Enable service discovery for all namespaces (aligned with COELHOCloud)
      serviceMonitorSelectorNilUsesHelmValues: false
      podMonitorSelectorNilUsesHelmValues: false
      ruleSelectorNilUsesHelmValues: false
      serviceMonitorNamespaceSelector: {}
      podMonitorNamespaceSelector: {}
    # Prometheus service configuration
    service:
      type: NodePort
      port: 9090
      targetPort: 9090
      nodePort: 30023
  # Grafana configuration
  grafana:
    enabled: true
    # Admin credentials
    adminUser: admin
    adminPassword: admin123
    # Service configuration
    service:
      type: NodePort
      port: 3000
      targetPort: 3000
      nodePort: 30024
    # Resource limits
    resources:
      requests:
        cpu: 10m
        memory: 300Mi
      limits:
        memory: 512Mi
    # Use PostgreSQL as database backend
    persistence:
      enabled: false  # Disabled since we use PostgreSQL
    # Disable init-chown-data (causes permission issues in K3D) - from COELHOCloud
    initChownData:
      enabled: false
    # Init container to create grafana database in PostgreSQL before Grafana starts
    extraInitContainers:
      - name: init-postgres-grafana-db
        image: bitnami/postgresql:latest
        command:
          - /bin/bash
          - -c
          - |
            echo "Waiting for PostgreSQL to be ready..."
            until PGPASSWORD=$POSTGRES_PASSWORD psql -h $PG_HOST -U postgres -c '\q' 2>/dev/null; do
              echo "PostgreSQL is unavailable - sleeping"
              sleep 2
            done
            echo "PostgreSQL is ready!"

            echo "Creating grafana user and database if not exists..."
            PGPASSWORD=$POSTGRES_PASSWORD psql -h $PG_HOST -U postgres <<-EOSQL
              DO \$\$
              BEGIN
                IF NOT EXISTS (SELECT FROM pg_catalog.pg_roles WHERE rolname = 'grafana') THEN
                  CREATE USER grafana WITH PASSWORD 'grafana123';
                END IF;
              END
              \$\$;

              SELECT 'CREATE DATABASE grafana OWNER grafana'
              WHERE NOT EXISTS (SELECT FROM pg_database WHERE datname = 'grafana')\gexec

              GRANT ALL PRIVILEGES ON DATABASE grafana TO grafana;
            EOSQL
            echo "Grafana database setup complete!"
        env:
          - name: PG_HOST
            value: "coelhonexus-postgresql"
          - name: POSTGRES_PASSWORD
            value: "postgres123"
    # PostgreSQL database configuration for Grafana (dedicated grafana user)
    env:
      GF_DATABASE_TYPE: postgres
      GF_DATABASE_HOST: coelhonexus-postgresql:5432
      GF_DATABASE_NAME: grafana
      GF_DATABASE_USER: grafana
      GF_DATABASE_PASSWORD: grafana123
      GF_DATABASE_SSL_MODE: disable
    # Default dashboards
    defaultDashboardsEnabled: true
    defaultDashboardsTimezone: browser
    # Sidecar for dashboard/datasource discovery (aligned with COELHOCloud)
    sidecar:
      dashboards:
        enabled: true
        label: grafana_dashboard
        labelValue: "1"
        searchNamespace: ALL
        folderAnnotation: grafana_folder
        provider:
          foldersFromFilesStructure: true
      datasources:
        enabled: true
        # Disable default datasource - we provision our own below
        defaultDatasourceEnabled: false
    # Datasources provisioned directly (not via sidecar) to avoid timing issues
    datasources:
      datasources.yaml:
        apiVersion: 1
        datasources:
          - name: Prometheus
            type: prometheus
            uid: prometheus
            url: http://coelhonexus-kube-prometheu-prometheus.coelhonexus:9090/
            access: proxy
            isDefault: true
            jsonData:
              httpMethod: POST
              timeInterval: 30s
          - name: Alertmanager
            type: alertmanager
            uid: alertmanager
            url: http://coelhonexus-kube-prometheu-alertmanager.coelhonexus:9094/
            access: proxy
            jsonData:
              handleGrafanaManagedAlerts: false
              implementation: prometheus
    # Additional data sources
    additionalDataSources: []
    # Grafana.ini configuration
    grafana.ini:
      server:
        root_url: "%(protocol)s://%(domain)s:%(http_port)s/"
        serve_from_sub_path: false
      auth.anonymous:
        enabled: true
        org_role: Viewer
  # Alertmanager configuration
  alertmanager:
    enabled: true
    alertmanagerSpec:
      resources:
        requests:
          cpu: 5m
          memory: 64Mi
        limits:
          memory: 128Mi
      storage:
        volumeClaimTemplate:
          spec:
            storageClassName: local-path
            accessModes: ["ReadWriteOnce"]
            resources:
              requests:
                storage: 1Gi
    # Service configuration - Port 9094 to avoid conflict with Kafka controller (9093)
    service:
      type: NodePort
      port: 9094
      targetPort: 9093  # Alertmanager internal port stays 9093
      nodePort: 30025
    # Alertmanager notification configuration
    config:
      global:
        resolve_timeout: 5m
      templates:
        - '/etc/alertmanager/config/*.tmpl'
      route:
        receiver: 'null'
        group_by: ['alertname', 'namespace', 'severity']
        group_wait: 30s
        group_interval: 5m
        repeat_interval: 4h
        routes:
          - receiver: 'null'
            matchers:
              - severity = "critical"
            group_wait: 10s
            group_interval: 1m
            repeat_interval: 1h
            continue: true
          - receiver: 'null'
            matchers:
              - severity = "warning"
            group_wait: 1m
            group_interval: 10m
            repeat_interval: 6h
            continue: true
          - receiver: 'null'
            matchers:
              - severity = "info"
            group_wait: 5m
            group_interval: 30m
            repeat_interval: 24h
          - receiver: 'null'
            matchers:
              - alertname = "Watchdog"
          - receiver: 'null'
            matchers:
              - alertname = "InfoInhibitor"
      receivers:
        - name: 'null'
      inhibit_rules:
        - source_matchers:
            - severity = "critical"
          target_matchers:
            - severity = "warning"
          equal: ['alertname', 'namespace']
        - source_matchers:
            - alertname = "NodeDown"
          target_matchers:
            - severity =~ "warning|critical"
          equal: ['node']
        - source_matchers:
            - alertname = "InfoInhibitor"
          target_matchers:
            - severity = "info"
          equal: ['namespace']
  # Node Exporter for node-level metrics
  nodeExporter:
    enabled: true
    resources:
      requests:
        cpu: 5m
        memory: 20Mi
      limits:
        memory: 50Mi
  # kube-state-metrics for Kubernetes object metrics
  kubeStateMetrics:
    enabled: true
  kube-state-metrics:
    resources:
      requests:
        cpu: 5m
        memory: 80Mi
      limits:
        memory: 150Mi
  # Disable components not needed for local k3d development
  kubeApiServer:
    enabled: true
  kubeControllerManager:
    enabled: false  # Not accessible in k3d
  kubeScheduler:
    enabled: false  # Not accessible in k3d
  kubeProxy:
    enabled: false  # k3d uses different networking
  kubeEtcd:
    enabled: false  # Not accessible in k3d
  # CoreDNS monitoring
  coreDns:
    enabled: true
  # Kubelet monitoring
  kubelet:
    enabled: true
  # Default rules for alerting
  defaultRules:
    create: true
    rules:
      alertmanager: true
      etcd: false  # Not accessible in k3d
      configReloaders: true
      general: true
      k8sContainerCpuUsageSecondsTotal: true
      k8sContainerMemoryCache: true
      k8sContainerMemoryRss: true
      k8sContainerMemorySwap: true
      k8sContainerResource: true
      k8sPodOwner: true
      kubeApiserverAvailability: true
      kubeApiserverBurnrate: true
      kubeApiserverHistogram: true
      kubeApiserverSlos: true
      kubeControllerManager: false  # Not accessible in k3d
      kubelet: true
      kubeProxy: false  # k3d uses different networking
      kubePrometheusGeneral: true
      kubePrometheusNodeRecording: true
      kubernetesApps: true
      kubernetesResources: true
      kubernetesStorage: true
      kubernetesSystem: true
      kubeSchedulerAlerting: false  # Not accessible in k3d
      kubeSchedulerRecording: false  # Not accessible in k3d
      kubeStateMetrics: true
      network: true
      node: true
      nodeExporterAlerting: true
      nodeExporterRecording: true
      prometheus: true
      prometheusOperator: true
      windows: false
