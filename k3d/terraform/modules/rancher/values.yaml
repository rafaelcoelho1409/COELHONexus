# =============================================================================
# RANCHER HELM VALUES (OPTIMIZED)
# =============================================================================
#
# Access: https://localhost:7443
#
# Resource optimization (actual usage from COELHOCloud: 13m CPU, 901Mi RAM):
#   - CPU request reduced from 200m to 100m (8x headroom for safety)
#   - Memory limit kept at 1Gi (actively used ~900Mi)
# =============================================================================

# Hostname - use localhost for NodePort access
hostname: localhost

# Single replica for dev/home lab
replicas: 1

# Bootstrap password (change on first login)
bootstrapPassword: admin

# TLS configuration - external (no cert-manager)
tls: external

# Ingress - DISABLED (using NodePort instead)
ingress:
  enabled: false

# Service configuration - NodePort with specific ports
service:
  type: NodePort
  annotations: {}

# Image configuration
rancherImage: rancher/rancher
rancherImageTag: v2.13.2
rancherImagePullPolicy: IfNotPresent

# -----------------------------------------------------------------------------
# Resource Limits (optimized for homelab)
# -----------------------------------------------------------------------------
# Actual usage: 13m CPU, 901Mi RAM
# CPU reduced 200m -> 100m (8x headroom for safety)
# Memory limit kept at 1Gi - Rancher actively uses ~900Mi
resources:
  requests:
    cpu: 100m
    memory: 512Mi
  limits:
    memory: 1Gi

# -----------------------------------------------------------------------------
# Extra Environment Variables
# -----------------------------------------------------------------------------
# Enable Prometheus metrics endpoint for monitoring
extraEnv:
  - name: CATTLE_PROMETHEUS_METRICS
    value: "true"

# -----------------------------------------------------------------------------
# Audit Logging (disabled to save resources)
# -----------------------------------------------------------------------------
auditLog:
  level: 0
