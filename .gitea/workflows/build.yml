# =============================================================================
# GITEA ACTIONS - COELHONexus CI/CD
# =============================================================================
# Pipeline: git push -> Gitea Actions -> Docker build -> ArgoCD deploy
#
# Fully automated - just push to master!
#
# Required Gitea Secrets:
#   - KUBECONFIG_BASE64: base64 encoded kubeconfig for cluster access
#
# Registry: 172.27.0.8:5000 (k3d registry IP on docker network)
#
# Setup (one-time):
#   1. Go to: Gitea → COELHONexus → Settings → Actions → Secrets
#   2. Add secret named: KUBECONFIG_BASE64
#   3. Value: cat ~/.kube/config | base64 -w0
# =============================================================================

name: Build and Deploy

on:
  push:
    branches:
      - master

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        run: |
          # Use in-cluster URL (job containers can't resolve Tailscale hostnames)
          git clone "http://gitea-http.gitea.svc.cluster.local:3000/${GITHUB_REPOSITORY}.git" .
          git checkout "${GITHUB_SHA}"

      - name: Setup buildx with custom DNS
        run: |
          docker buildx create --name mybuilder --driver docker-container \
            --driver-opt network=host \
            --buildkitd-flags '--allow-insecure-entitlement network.host'
          docker buildx use mybuilder

      - name: Build and push FastAPI image
        run: |
          echo "Building coelhonexus-fastapi..."
          for i in 1 2 3; do
            docker buildx build --load \
              --network=host \
              -t 172.27.0.8:5000/coelhonexus-fastapi:latest \
              -f apps/fastapi/Dockerfile.fastapi apps/fastapi && break
            echo "Retry $i/3 in 15s..."
            sleep 15
          done
          docker push 172.27.0.8:5000/coelhonexus-fastapi:latest
          echo "FastAPI image pushed"

      - name: Build and push Web image
        run: |
          echo "Building coelhonexus-web..."
          for i in 1 2 3; do
            docker buildx build --load \
              --network=host \
              -t 172.27.0.8:5000/coelhonexus-web:latest \
              -f apps/web/Dockerfile.web apps/web && break
            echo "Retry $i/3 in 15s..."
            sleep 15
          done
          docker push 172.27.0.8:5000/coelhonexus-web:latest
          echo "Web image pushed"

  deploy:
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - name: Checkout code
        run: |
          # Use in-cluster URL (job containers can't resolve Tailscale hostnames)
          git clone "http://gitea-http.gitea.svc.cluster.local:3000/${GITHUB_REPOSITORY}.git" .
          git checkout "${GITHUB_SHA}"

      - name: Install kubectl
        run: |
          curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
          chmod +x kubectl
          sudo mv kubectl /usr/local/bin/

      - name: Setup kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG_BASE64 }}" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Apply ArgoCD Application (idempotent)
        run: |
          kubectl apply -f k8s/argocd/application.yaml
          echo "ArgoCD application applied"

      - name: Wait for ArgoCD sync
        run: |
          echo "Waiting for ArgoCD to sync..."
          sleep 10

      - name: Restart deployments to pull new images
        run: |
          # Check if deployments exist, if not wait for ArgoCD
          for i in {1..30}; do
            if kubectl get deployment/coelhonexus-fastapi -n coelhonexus-prod &>/dev/null; then
              break
            fi
            echo "Waiting for deployments to be created by ArgoCD... ($i/30)"
            sleep 10
          done

          kubectl rollout restart deployment/coelhonexus-fastapi -n coelhonexus-prod
          kubectl rollout restart deployment/coelhonexus-web -n coelhonexus-prod
          echo "Deployments restarted - pulling new images"

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/coelhonexus-fastapi -n coelhonexus-prod --timeout=300s
          kubectl rollout status deployment/coelhonexus-web -n coelhonexus-prod --timeout=300s
          echo "Deployment complete!"
