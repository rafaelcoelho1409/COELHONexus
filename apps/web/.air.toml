# Air hot-reload configuration
root = "."
tmp_dir = "tmp"

[build]
# Build Go binary (add templ generate when templates exist)
cmd = "go build -o ./tmp/main ."
bin = "./tmp/main"
# Watch these extensions
include_ext = ["go"]
# Exclude directories
exclude_dir = ["tmp", "static"]
# Delay before rebuild (ms)
delay = 500
# Stop old binary before building
stop_on_error = true
send_interrupt = true
kill_delay = 500

[log]
time = false

[misc]
clean_on_exit = true
