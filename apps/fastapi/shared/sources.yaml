# Curated catalog of documentation sources for the Docs Distiller resolver.
# Pivoted from the previous 6-list layout (docs_url / llms_full_txt / llms_txt /
# sitemap_xml / github_repo / categories) into one entry per framework so each
# fact lives in exactly one place.
#
# Per-entry fields (all optional except `name`):
#   name        canonical display name (also the resolver lookup key)
#   category    "Python" | "Programming Language" | "Pentest" — omit if unset
#   docs        canonical docs landing URL
#   llms_full   llms-full.txt bundle (Tier 1 ingestion)
#   llms_txt    llms.txt index (Tier 2)
#   sitemap     sitemap.xml (Tier 3)
#   github      upstream GitHub repository
#
# Ecosystem bundles: when multiple projects share the same docs URL
# (LangChain/LangGraph/DeepAgents under docs.langchain.com; Grafana +
# Alloy/Loki/Mimir/Tempo under grafana.com/en/sitemap.xml), they're
# unified into ONE catalog entry whose display name lists every member
# (e.g. "LangChain - LangGraph - DeepAgents"). Avoids ingesting the
# identical corpus N times into N orphan MinIO slugs.

