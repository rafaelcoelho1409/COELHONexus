[project]
name = "coelhonexus-fastapi"
version = "1.0.0"
description = "COELHO Nexus - FastAPI"
requires-python = ">=3.13"
dependencies = [
    "fastapi",
    "uvicorn",
    "pydantic",
    "starlette",
    "python-dotenv",
    "deepagents",
    "langchain",
    "langgraph",
    "langchain-openai",        # OpenAI, NVIDIA NIM, SambaNova
    "langchain-groq",          # Groq
    "langchain-ollama",        # Ollama (local)
    "langchain-community",     # FastEmbedEmbeddings (ONNX, no PyTorch)
    "langchain-neo4j",         # Neo4j graph database
    "langchain-qdrant",        # Qdrant vector store
    "langchain-experimental",  # LLMGraphTransformer
    "langchain-text-splitters", # Text chunking
    "tiktoken",                # Token counting for KD synth budget (Tier 1 #2 — replaces char-based cap)
    "langfuse",                # LLM observability (Tier 3 #14 + 0d-5): per-model preservation rate, prompt versioning, trace replay
    "litellm==1.83.12",        # LLM Router w/ fail-fast (enable_pre_call_checks + cooldown + retry policy). PINNED EXACT — v1.82.7 and v1.82.8 were COMPROMISED via Trivy CI/CD supply-chain attack on 2026-03-24. Do NOT allow >=1.82.7,<1.83.0. v1.83.0+ ships from the rebuilt CI/CD v2 pipeline (isolated envs, signed). Bump manually after checking https://docs.litellm.ai/blog for security notices.
    "langchain-litellm==0.6.4", # LangChain wrapper around LiteLLM Router (ChatLiteLLMRouter). Pin matches the clean litellm 1.83.x line.
    "langchain-google-genai",  # Native Gemini integration — more reliable function calling than the OAI-compat endpoint
    "langgraph-checkpoint-redis",
    "langgraph-checkpoint-postgres",  # PostgreSQL checkpointer for conversation persistence
    "psycopg[binary]",               # PostgreSQL async driver (binary — no libpq needed)
    "fastembed",               # Dense + BM25 embeddings (ONNX, local, no torch)
    "scikit-learn",            # Calinski-Harabasz + KMeans fallback for KD REDUCE (Clio pattern)
    "umap-learn",              # Dim reduction before k-means (KD REDUCE): silhouette 0.06 → ~0.25 on same-domain text
    "k-means-constrained",     # Balanced k-means (KD REDUCE): enforces size_min/size_max per meta-cluster
    "httpx",                   # HTTP client for NVIDIA NIM embedding API
    "flashrank",               # Cross-encoder reranker (local, no API cost)
    "rapidfuzz",               # Fuzzy string matching for entity resolution
    "qdrant-client",           # Qdrant vector database client
    "neo4j",
    "redis",
    "celery[redis]",               # Distributed task queue (background workers)
    "yt-dlp",                  # YouTube metadata extraction (subprocess)
    "bgutil-ytdlp-pot-provider>=1.3.0",  # PO Token plugin (latest, matches sidecar API)
    "curl_cffi>=0.11,<0.15",       # Browser impersonation for yt-dlp (0.15 unsupported)
    "orjson",                  # Fast JSON parsing
    "elasticsearch[async]>=8.0.0,<9.0.0",  # ES server is v8
    "playwright",              # Browser automation (connects to remote server)
    "tenacity",                # Retry with exponential backoff
    "crawl4ai>=0.8.0,<0.9",    # LLM-friendly docs crawler (Knowledge Distiller Tier 4)
    "trafilatura>=2.0",        # HTML → markdown extractor for KD Tier 3/4 (pure Python, F1≈0.791 on docs)
    "llms-txt>=0.0.6",         # Official AnswerDotAI llms.txt parser (KD Tier 2)
    "aioboto3>=13.0",          # Async S3 client for MinIO (Knowledge Distiller storage)
    "pypandoc>=1.13",          # Pandoc Python wrapper (KD exports: PDF/HTML/EPUB). Requires system `pandoc` + `texlive-xetex` for PDF (installed in Dockerfile.fastapi).
    "genanki>=0.13",           # Anki .apkg generator (KD exports: flashcards per chapter)
    "py-spy>=0.4",             # Live Python process sampler (attach to Celery worker pid to dump a hung task's stack without restarting)
    "mdformat>=0.7",           # OP-60 (2026-04-25): pure-Python markdown formatter — post-curator syntax normalization (heading depth, fence languages, list markers)
    "mdformat-gfm>=0.3",       # OP-60: GitHub Flavored Markdown plugin (tables, strikethrough)
    "tree-sitter>=0.23,<0.25",       # OP-59 (2026-04-25): universal parser library. <0.25 to avoid ABI breaks
    # OP-59 (2026-04-25): pre-compiled tree-sitter grammars (~305 languages) — replaces LLM code_syntax_valid critic.
    # Upper bound <1.6 because v1.6.2/1.6.3 only ship cp314 wheels; cp313 wheels start again at older releases. Pin below the broken band.
    "tree-sitter-language-pack>=0.4,<1.6",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[dependency-groups]
dev = []
