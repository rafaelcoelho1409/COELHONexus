[project]
name = "coelhonexus-fastapi"
version = "1.0.0"
description = "COELHO Nexus - FastAPI"
requires-python = ">=3.13"
dependencies = [
    # HTTP API
    "fastapi",
    "uvicorn",
    "prometheus-fastapi-instrumentator",
    "pydantic",
    "starlette",
    "langchain-groq",
    "langchain-openai",
    "langchain-nvidia-ai-endpoints",
    "langchain-google-genai",
    "google-generativeai",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[dependency-groups]
dev = []
