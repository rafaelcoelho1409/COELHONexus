[project]
name = "coelhonexus-fastapi"
version = "1.0.0"
description = "COELHO Nexus - FastAPI"
requires-python = ">=3.13"
dependencies = [
    "fastapi",
    "uvicorn",
    "pydantic",
    "starlette",
    "python-dotenv",
    "deepagents",
    "langchain",
    "langgraph",
    "langchain-openai",        # OpenAI, NVIDIA NIM, SambaNova
    "langchain-groq",          # Groq
    "langchain-ollama",        # Ollama (local)
    "langchain-community",     # FastEmbedEmbeddings (ONNX, no PyTorch)
    "langchain-neo4j",         # Neo4j graph database
    "langchain-qdrant",        # Qdrant vector store
    "langchain-experimental",  # LLMGraphTransformer
    "langchain-text-splitters", # Text chunking
    "langgraph-checkpoint-redis",
    "langgraph-checkpoint-postgres",  # PostgreSQL checkpointer for conversation persistence
    "psycopg[binary]",               # PostgreSQL async driver (binary — no libpq needed)
    "fastembed",               # BM25 sparse embeddings (local, lightweight)
    "httpx",                   # HTTP client for NVIDIA NIM embedding API
    "flashrank",               # Cross-encoder reranker (local, no API cost)
    "rapidfuzz",               # Fuzzy string matching for entity resolution
    "qdrant-client",           # Qdrant vector database client
    "neo4j",
    "redis",
    "celery[redis]",               # Distributed task queue (background workers)
    "yt-dlp",                  # YouTube metadata extraction (subprocess)
    "bgutil-ytdlp-pot-provider>=1.3.0",  # PO Token plugin (latest, matches sidecar API)
    "curl_cffi>=0.11,<0.15",       # Browser impersonation for yt-dlp (0.15 unsupported)
    "orjson",                  # Fast JSON parsing
    "elasticsearch[async]>=8.0.0,<9.0.0",  # ES server is v8
    "playwright",              # Browser automation (connects to remote server)
    "tenacity",                # Retry with exponential backoff
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[dependency-groups]
dev = []
