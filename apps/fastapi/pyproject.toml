[project]
name = "coelhonexus-fastapi"
version = "1.0.0"
description = "COELHO Nexus - FastAPI base shell"
requires-python = ">=3.13"
dependencies = [
    "fastapi",
    "uvicorn[standard]",
    "pydantic",
    "python-dotenv",
    "httpx",
    "celery[redis]",
    "redis",
    "pyyaml",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[dependency-groups]
dev = []
