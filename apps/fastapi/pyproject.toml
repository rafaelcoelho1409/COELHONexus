[project]
name = "coelhonexus-fastapi"
version = "1.0.0"
description = "COELHO Nexus - FastAPI"
requires-python = ">=3.13"
dependencies = [
    "fastapi",
    "uvicorn",
    "pydantic",
    "starlette",
    "python-dotenv",
    "deepagents",
    "langchain",
    "langgraph",
    "langchain-openai",        # OpenAI, NVIDIA NIM, SambaNova
    "langchain-groq",          # Groq
    "langchain-ollama",        # Ollama (local)
    "langchain-huggingface",   # HuggingFace embeddings
    "langchain-neo4j",         # Neo4j graph database
    "langchain-experimental",  # LLMGraphTransformer
    "langgraph-checkpoint-redis",
    "sentence-transformers",   # Local embeddings
    "neo4j",
    "redis",
    "yt-dlp",                  # YouTube metadata extraction (subprocess)
    "bgutil-ytdlp-pot-provider>=1.3.0",  # PO Token plugin (latest, matches sidecar API)
    "curl_cffi>=0.11",             # Browser impersonation for yt-dlp
    "youtube-transcript-api",  # Transcriptions with proxy support
    "PySocks",                 # SOCKS proxy support for youtube-transcript-api
    "orjson",                  # Fast JSON parsing
    "elasticsearch[async]>=8.0.0,<9.0.0",  # ES server is v8
    "playwright",              # Browser automation (connects to remote server)
    "tenacity",                # Retry with exponential backoff
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project.optional-dependencies]
cpu = ["torch", "torchvision"]

[dependency-groups]
dev = []

# =============================================================================
# CPU-only PyTorch via extras
# Usage: uv sync --extra cpu
# =============================================================================
[tool.uv.sources]
torch = [{ index = "pytorch-cpu", extra = "cpu" }]
torchvision = [{ index = "pytorch-cpu", extra = "cpu" }]

[[tool.uv.index]]
name = "pytorch-cpu"
url = "https://download.pytorch.org/whl/cpu"
explicit = true
