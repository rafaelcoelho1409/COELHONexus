[project]
name = "coelhonexus-fastapi"
version = "1.0.0"
description = "COELHO Nexus - FastAPI"
requires-python = ">=3.13"
dependencies = [
    # HTTP API
    "fastapi",
    "uvicorn",
    "pydantic",
    "starlette",
    "python-dotenv",
    "deepagents",
    "langchain",
    "langgraph",
    "langchain-openai",   # OpenAI, NVIDIA NIM, SambaNova
    "langchain-groq",     # Groq
    "langchain-ollama",   # Ollama (local)
    "langgraph-checkpoint-redis",
    "redis",
    "neo4j",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[dependency-groups]
dev = []
