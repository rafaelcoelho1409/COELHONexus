[project]
name = "coelhonexus-fastapi"
version = "1.0.0"
description = "COELHO Nexus - FastAPI"
requires-python = ">=3.13"
dependencies = [
    # HTTP API
    "fastapi",
    "uvicorn",
    "pydantic",
    "starlette",
    "deepagents",
    "langchain",
    "langchain-openai",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[dependency-groups]
dev = []
